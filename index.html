<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MURMUR ART - 老師後台</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體}
    body{background:linear-gradient(120deg,#f5f7fb,#e8edff);background-size:200% 200%;animation:bg 15s infinite;color:#444}
    @keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
    .container{width:90%;max-width:1200px;margin:0 auto;padding:20px 0}
    .login{display:flex;justify-content:center;align-items:center;height:100vh;padding:20px}
    .card{background:white;border-radius:20px;padding:40px;max-width:450px;width:100%;box-shadow:0 10px 40px #879acb33}
    .title{text-align:center;font-size:28px;color:#879acb;margin-bottom:30px}
    .input{width:100%;padding:12px;border:2px solid #e8edff;border-radius:10px;margin-bottom:20px;font-size:16px}
    .btn{width:100%;padding:12px;background:#879acb;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer}
    .navbar{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);padding:15px 0;position:sticky;top:0;z-index:99}
    .nav{display:flex;justify-content:space-between;align-items:center}
    .logo{font-size:24px;color:#879acb;font-weight:bold}
    .menu a{margin-left:20px;color:#666;text-decoration:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px}
    .stu{background:white;border-radius:15px;padding:20px;text-align:center}
    .stu img{width:80px;height:80px;border-radius:50%;margin-bottom:10px;border:3px solid #879acb}
    .action{margin-top:10px;display:flex;gap:5px;justify-content:center}
    .action button{padding:5px 10px;border:none;border-radius:5px}
    .gallery{position:relative;width:100%;height:700px;margin:40px 0;display:flex;justify-content:center;align-items:center}
    .avatar{width:200px;height:200px;border-radius:50%;border:8px solid #879acb;position:absolute;z-index:10}
    .rotate{width:450px;height:450px;position:relative;animation:r 25s linear infinite}
    @keyframes r{100%{transform:rotate(360deg)}}
    .art{position:absolute;width:160px;height:160px;border-radius:12px;overflow:hidden;box-shadow:0 8px 20px #00000020}
    .art img{width:100%;height:100%;object-fit:cover}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000dd;display:none;justify-content:center;align-items:center;padding:20px}
    .modal .box{background:white;border-radius:15px;padding:30px;max-width:500px;width:100%}
    .add{position:fixed;bottom:30px;right:30px;width:60px;height:60px;border-radius:50%;background:#879acb;color:white;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    table{width:100%;background:white;border-radius:15px;overflow:hidden;margin-top:20px}
    th{background:#879acb;color:white;padding:12px}
    td{padding:12px;border-bottom:1px solid #e8edff}
    .badge{padding:5px 10px;border-radius:20px;font-size:12px}
    .ok{background:#d4edda;color:#28a745}
    .wait{background:#fff3cd;color:#ffc107}
    .leave{background:#f8d7da;color:#dc3545}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="loginPage" class="login">
    <div class="card">
      <div class="title">老師管理後台</div>
      <input class="input" id="pwd" type="password" placeholder="輸入老師密碼">
      <button class="btn" onclick="login()">登入</button>
    </div>
  </div>

  <div id="main" style="display:none">
    <div class="navbar">
      <div class="container nav">
        <div class="logo">MURMUR ART</div>
        <div class="menu">
          <a onclick="show(1)">學生管理</a>
          <a onclick="show(2)">作品上傳</a>
          <a onclick="show(3)">課程管理</a>
          <a onclick="logout()">登出</a>
        </div>
      </div>
    </div>

    <div class="container">
      <div id="page1">
        <h2 style="color:#879acb;margin-bottom:10px">學生管理</h2>
        <button class="btn" style="width:auto;padding:8px 15px" onclick="addStu()">+ 新增學生</button>
        <div class="grid" id="stuList"></div>
      </div>

      <div id="page2" style="display:none">
        <h2 style="color:#879acb;margin-bottom:10px">學生作品</h2>
        <div class="gallery" id="gallery">
          <img class="avatar" id="mainAvatar" src="https://via.placeholder.com/200">
          <div class="rotate" id="rotateWrap"></div>
        </div>
        <div class="add" onclick="openArt()">+</div>
      </div>

      <div id="page3" style="display:none">
        <h2 style="color:#879acb;margin-bottom:10px">課程管理</h2>
        <button class="btn" style="width:auto;padding:8px 15px" onclick="addCourse()">+ 新增課程</button>
        <table>
          <thead>
            <tr><th>日期</th><th>時間</th><th>主題</th><th>狀態</th><th>操作</th></tr>
          </thead>
          <tbody id="courseBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal" id="stuModal"><div class="box"><h3>學生資料</h3><input class="input" id="sname" placeholder="姓名"><input class="input" id="sphone" placeholder="家長電話"><button class="btn" onclick="saveStu()">儲存</button></div></div>
  <div class="modal" id="artModal"><div class="box"><h3>上傳作品</h3><input class="input" id="img" placeholder="圖片網址"><input class="input" id="cdate" type="date"><textarea class="input" id="desc" placeholder="說明"></textarea><button class="btn" onclick="saveArt()">儲存</button></div></div>
  <div class="modal" id="courseModal"><div class="box"><h3>課程</h3><input class="input" type="date" id="cday"><input class="input" type="time" id="ctime"><input class="input" id="ctitle" placeholder="主題"><select class="input" id="cstatus"><option>pending</option><option>completed</option><option>leave</option></select><button class="btn" onclick="saveCourse()">儲存</button></div></div>

  <script>
    const firebaseConfig = {apiKey:"AIzaSyBqUEh-MjMZ5Gj2gaFJpKffrDmvP9l7Slo",authDomain:"murmurart-8f6cc.firebaseapp.com",projectId:"murmurart-8f6cc",messagingSenderId:"205741159610",appId:"1:205741159610:web:624b7ca35c04e6e09a7e83"};
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);const db=firebase.firestore();
    const PWD="teacher123";let current=null;

    function login(){if(document.getElementById("pwd").value!==PWD)return alert("密碼錯誤");document.getElementById("loginPage").style.display="none";document.getElementById("main").style.display="block";loadStu()}
    function show(n){document.getElementById("page1").style.display=n===1?"block":"none";document.getElementById("page2").style.display=n===2?"block":"none";document.getElementById("page3").style.display=n===3?"block":"none"}
    function logout(){location.reload()}

    async function loadStu(){const r=await db.collection("students").get();const list=document.getElementById("stuList");list.innerHTML="";r.forEach(d=>{const s={id:d.id,...d.data()};list.innerHTML+=`<div class="stu"><img src="https://via.placeholder.com/80"><h3>${s.name}</h3><p>家長：${s.parentPhone||"-"}</p><div class="action"><button onclick="view('${s.id}')">作品</button><button onclick="editStu('${s.id}')">編輯</button><button onclick="delStu('${s.id}')">刪除</button></div></div>`})}
    function addStu(){current=null;document.getElementById("sname").value="";document.getElementById("sphone").value="";document.getElementById("stuModal").style.display="flex"}
    async function saveStu(){const n=document.getElementById("sname").value,p=document.getElementById("sphone").value;if(!n||!p)return;if(current){await db.collection("students").doc(current).update({name:n,parentPhone:p})}else{await db.collection("students").add({name:n,parentPhone:p,createdAt:new Date()})}document.getElementById("stuModal").style.display="none";loadStu()}
    async function delStu(id){if(!confirm("確定刪除？"))return;await db.collection("students").doc(id).delete();loadStu()}
    function editStu(id){current=id;const s=db.collection("students").doc(id).get().then(d=>{const data=d.data();document.getElementById("sname").value=data.name;document.getElementById("sphone").value=data.parentPhone||"";document.getElementById("stuModal").style.display="flex"})}

    function view(id){current=id;show(2);loadArt(id);loadCourse(id)}
    async function loadArt(id){const g=document.getElementById("rotateWrap");g.innerHTML="";const r=await db.collection("artworks").where("studentId","==",id).get();const s=await db.collection("students").doc(id).get();document.getElementById("mainAvatar").src=s.data().avatar||"https://via.placeholder.com/200";let a=0;const step=360/r.size;r.forEach(d=>{const art=d.data();g.innerHTML+=`<div class="art" style="transform:rotate(${a}deg) translate(220px) rotate(${-a}deg)"><img src="${art.imageUrl}"></div>`;a+=step})}
    function openArt(){document.getElementById("artModal").style.display="flex"}
    async function saveArt(){const u=document.getElementById("img").value,d=document.getElementById("cdate").value,de=document.getElementById("desc").value;if(!u||!d||!current)return;await db.collection("artworks").add({studentId:current,imageUrl:u,createDate:d,description:de,time:new Date()});document.getElementById("artModal").style.display="none";loadArt(current)}

    async function loadCourse(id){const b=document.getElementById("courseBody");b.innerHTML="";const r=await db.collection("courses").where("studentId","==",id).get();r.forEach(d=>{const c=d.data();const t={pending:"wait",completed:"ok",leave:"leave"};const n={pending:"未完成",completed:"已完成",leave:"請假"};b.innerHTML+=`<tr><td>${c.date}</td><td>${c.time}</td><td>${c.theme}</td><td><span class="badge ${t[c.status]}">${n[c.status]}</span></td><td><button onclick="editCourse('${d.id}')">修改</button></td></tr>`})}
    function addCourse(){document.getElementById("cday").valueAsDate=new Date();document.getElementById("ctime").value="";document.getElementById("ctitle").value="";document.getElementById("cstatus").value="pending";document.getElementById("courseModal").style.display="flex";currentCourse=null}
    async function saveCourse(){const d=document.getElementById("cday").value,t=document.getElementById("ctime").value,th=document.getElementById("ctitle").value,s=document.getElementById("cstatus").value;if(!d||!t||!th||!current)return;if(currentCourse){await db.collection("courses").doc(currentCourse).update({date:d,time:t,theme:th,status:s})}else{await db.collection("courses").add({studentId:current,date:d,time:t,theme:th,status:s})}document.getElementById("courseModal").style.display="none";loadCourse(current)}
    function editCourse(id){currentCourse=id;db.collection("courses").doc(id).get().then(d=>{const c=d.data();document.getElementById("cday").value=c.date;document.getElementById("ctime").value=c.time;document.getElementById("ctitle").value=c.theme;document.getElementById("cstatus").value=c.status;document.getElementById("courseModal").style.display="flex"})}
  </script>
</body>
</html>
