<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

<!-- ====================== 登入 + 顯示資料 ====================== -->
<script>
let currentStudent = null;

// 家長登入（只有老師建立的學生才能登入）
async function parentLogin() {
    const name = document.getElementById("studentName").value.trim();
    const phone = document.getElementById("studentPhone").value.trim();
    const status = document.getElementById("loginStatus");

    if (!name || !phone) {
        status.textContent = "請輸入完整資訊";
        status.className = "status error";
        return;
    }

    try {
        // 查詢 Firebase 中老師建立的學生資料
        const studentRef = doc(db, "students", phone);
        const snap = await getDoc(studentRef);

        if (!snap.exists()) {
            status.textContent = "❌ 找不到學生資料，請聯繫老師建立";
            status.className = "status error";
            return;
        }

        // 登入成功
        currentStudent = snap.data();
        status.textContent = `✅ 登入成功！歡迎 ${currentStudent.name} 家長`;
        status.className = "status success";

        // 顯示所有資料
        showAllData();

    } catch (e) {
        status.textContent = "❌ 登入失敗，請稍後再試";
        status.className = "status error";
    }
}

// 顯示：課程 + 作品 + 老師評語
async function showAllData() {
    // 顯示課程進度
    document.getElementById("courseSection").style.display = "block";
    document.getElementById("courseList").innerHTML = `
        <div class="progress-card">
            <div>兒童美術基礎班</div>
            <div class="progress-bar-bg"><div class="progress-bar" style="width:65%"></div></div>
            <div>進度：65%</div>
        </div>
        <div class="progress-card">
            <div>創意手工課程</div>
            <div class="progress-bar-bg"><div class="progress-bar" style="width:40%"></div></div>
            <div>進度：40%</div>
        </div>
    `;

    // 顯示作品面板
    document.getElementById("artSection").style.display = "block";
    
    // 作品圖片（老師在 Firebase 填入圖片網址）
    document.getElementById("artGrid").innerHTML = `
        <div class="art-card">
            <img class="art-img" src="https://picsum.photos/seed/${currentStudent.phone}/500/500" alt="作品1">
            <div class="art-info">作品：快樂小畫家</div>
        </div>
        <div class="art-card">
            <img class="art-img" src="https://picsum.photos/seed/art2/500/500" alt="作品2">
            <div class="art-info">作品：動物王國</div>
        </div>
    `;

    // 老師評語
    document.getElementById("teacherComment").innerHTML = `
        <strong>老師評語：</strong><br>
        ${currentStudent.name} 學習態度認真，創意豐富，色彩運用越來越棒！繼續加油！
    `;
}
</script>
