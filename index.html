<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MURMUR ART 學生/家長區</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體,"Noto Sans TC";transition:all 0.25s ease}
    body{background:linear-gradient(120deg,#fdfbf7,#f0e9ff);color:#444}
    .container{width:90%;max-width:1200px;margin:0 auto}
    .login{display:flex;justify-content:center;align-items:center;height:100vh;padding:20px}
    .card{background:white;border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:0 12px 40px #879acb2a}
    .title{text-align:center;font-size:30px;color:#879acb;margin-bottom:30px}
    .tabs{display:flex;margin-bottom:20px;border-radius:12px;overflow:hidden}
    .tab{flex:1;padding:12px;text-align:center;cursor:pointer;background:#e8edff;color:#666}
    .tab.active{background:#879acb;color:white}
    .input{width:100%;padding:14px;border:2px solid #e8edff;border-radius:12px;margin-bottom:16px;font-size:16px}
    .btn{width:100%;padding:14px;background:#879acb;color:white;border:none;border-radius:12px;font-size:16px;cursor:pointer}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 15px #879acb60}
    .navbar{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);padding:16px 0;position:sticky;top:0;z-index:99}
    .nav{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
    .logo{font-size:26px;color:#879acb;font-weight:bold}
    .menu{display:flex;gap:16px;flex-wrap:wrap}
    .menu a{color:#555;text-decoration:none;cursor-pointer;padding:4px 2px}
    .menu a:hover{color:#879acb}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px}
    .stu{background:white;border-radius:18px;padding:24px;text-align:center;position:relative;box-shadow:0 4px 12px #0000000a}
    .stu.warning{border:2px solid #ff9800}
    .stu img{width:85px;height:85px;border-radius:50%;margin-bottom:12px;border:4px solid #879acb}
    .stu .leftTag{background:#ff9800;color:white;padding:4px 8px;border-radius:10px;font-size:12px;margin-top:6px;display:inline-block}
    .action{margin-top:12px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .action button{padding:7px 13px;border:none;border-radius:8px;cursor-pointer}
    .action button:nth-child(1){background:#879acb;color:white}
    .action button:nth-child(2){background:#ffc107;color:white}
    .action button:nth-child(3){background:#dc3545;color:white}
    .gallery{position:relative;width:100%;height:700px;display:flex;justify-content:center;align-items:center;margin:30px 0}
    .avatar{width:200px;height:200px;border-radius:50%;border:8px solid #879acb;position:absolute;z-index:10}
    .rotate{width:450px;height:450px;position:relative;animation:r 25s linear infinite}
    @keyframes r{100%{transform:rotate(360deg)}}
    .art{position:absolute;width:160px;height:160px;border-radius:14px;overflow:hidden;box-shadow:0 8px 20px #00000020;cursor:pointer}
    .art img{width:100%;height:100%;object-fit:cover}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000dd;display:none;justify-content:center;align-items:center;padding:20px;z-index:999}
    .modal .box{background:white;border-radius:20px;padding:35px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto}
    .close{position:absolute;top:18px;right:18px;font-size:22px;cursor-pointer;color:#777}
    .add{position:fixed;bottom:35px;right:35px;width:65px;height:65px;border-radius:50%;background:#879acb;color:white;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    table{width:100%;background:white;border-radius:16px;overflow:hidden;margin-top:20px}
    th{background:#879acb;color:white;padding:16px;text-align:left}
    td{padding:16px;border-bottom:1px solid #e8edff}
    .badge{padding:7px 13px;border-radius:20px;font-size:13px}
    .ok{background:#d4edda;color:#28a745}
    .wait{background:#fff3cd;color:#ffc107}
    .leave{background:#f8d7da;color:#dc3545}
    .absent{background:#e9ecef;color:#6c757d}
    .holiday{background:#d1ecf1;color:#17a2b8}
    .course-package{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
    .package-btn{padding:10px 14px;background:#e8edff;border:none;border-radius:8px;cursor:pointer}
    .preview{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:800px;background:white;border-radius:20px;padding:25px;display:none;z-index:9999}
    .preview img{max-width:100%;max-height:400px;border-radius:12px}
    .prev,.next{position:absolute;top:50%;transform:translateY(-50%);font-size:24px;color:white;background:#879acb;padding:10px 18px;border-radius:10px;cursor:pointer}
    .prev{left:15px}
    .next{right:15px}
    .search{width:100%;padding:12px;border:2px solid #e8edff;border-radius:12px;margin-bottom:15px}
    .stats{background:white;padding:20px;border-radius:16px;display:flex;gap:15px;text-align:center;margin:15px 0}
    .stat{flex:1}
    .check-btn{background:#28a745;color:white;padding:8px 12px;border:none;border-radius:8px;margin-right:5px}
    .del-btn{background:#dc3545;color:white;padding:8px 12px;border:none;border-radius:8px}
    .batch-bar{margin:10px 0;padding:10px;background:#f8f9ff;border-radius:12px}
    .student-info-bar{background:#fff3cd;padding:12px 15px;border-radius:12px;margin-bottom:10px;font-size:15px}
    .course-img{max-width:120px;max-height:80px;border-radius:8px;margin-top:6px}
    .section-title{font-size:16px;color:#879acb;margin:10px 0 6px;font-weight:bold}
    .export-btn{background:#17a2b8;color:white;padding:8px 16px;border:none;border-radius:8px;margin-left:10px}
    .warningPage{background:#fff3cd;padding:15px;border-radius:16px;margin:15px 0}
    .warningItem{background:white;padding:12px;border-radius:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginPage" class="login">
  <div class="card">
    <div class="title">🎨 MURMUR ART 登入</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('parent')">家長</div>
      <div class="tab" onclick="switchTab('teacher')">老師</div>
    </div>
    <div id="parentLogin">
      <input class="input" id="pName" placeholder="學生姓名">
      <input class="input" id="pPhone" placeholder="家長電話">
      <button class="btn" onclick="parentLogin()">登入</button>
    </div>
    <div id="teacherLogin" style="display:none">
      <input class="input" id="pwd" type="password" placeholder="老師密碼">
      <button class="btn" onclick="teacherLogin()">登入</button>
    </div>
  </div>
</div>

<div id="main" style="display:none">
  <div class="navbar">
    <div class="container nav">
      <div class="logo">老師後台</div>
      <div class="menu">
        <a onclick="show(1)">學生管理</a>
        <a onclick="show(9)">續費提醒</a>
        <a onclick="show(2)">作品管理</a>
        <a onclick="show(3)">課程管理</a>
        <a onclick="logout()">登出</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="page1">
      <h2 style="margin-bottom:10px">學生管理</h2>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        <input class="search" id="searchStudent" placeholder="搜尋姓名/電話/編號" oninput="searchStudent()" style="margin:0;flex:1">
        <button class="btn" style="width:auto;padding:8px 15px" onclick="addStu()">+ 新增學生</button>
        <button class="export-btn" onclick="exportCSV()">匯出 CSV</button>
      </div>
      <div class="grid" id="stuList"></div>
    </div>

    <div id="page9" style="display:none">
      <h2 style="margin-bottom:10px">⚠️ 即將續費學生</h2>
      <div class="warningPage" id="warningList"></div>
    </div>

    <div id="page2" style="display:none">
      <h2 style="margin-bottom:10px">作品管理</h2>
      <select class="input" id="selectStudentForArt" onchange="switchArtStudent()"></select>
      <div class="gallery">
        <img class="avatar" id="mainAvatar" src="https://via.placeholder.com/200">
        <div class="rotate" id="rotateWrap"></div>
      </div>
      <div class="add" onclick="openArt()">+</div>
    </div>

    <div id="page3" style="display:none">
      <h2 style="margin-bottom:10px">課程管理</h2>
      <select class="input" id="selectStudentForCourse" onchange="switchCourseStudent()"></select>
      <input class="search" id="searchCourse" placeholder="搜尋學生編號" oninput="searchCourse()">
      <div id="studentInfoDisplay" class="student-info-bar" style="display:none;"></div>
      <button class="btn" style="width:auto;padding:8px 15px" onclick="addCourse()">+ 新增課程</button>
      <div class="stats" id="courseStats"></div>
      <div class="batch-bar">
        <small>批量操作：</small>
        <button class="check-btn" onclick="batchSet('completed')">已完成</button>
        <button class="check-btn" onclick="batchSet('leave')">請假</button>
        <button class="check-btn" onclick="batchSet('absent')">缺席</button>
        <button class="check-btn" onclick="batchSet('holiday')">公眾假期</button>
        <button class="del-btn" onclick="batchDeleteCourses()">批量刪除</button>
      </div>
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="checkAll"></th>
            <th>日期</th>
            <th>時間</th>
            <th>狀態</th>
            <th>課程照片</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="courseList"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="stuModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>學生資料</h3>
    <input class="input" id="sname" placeholder="姓名">
    <input class="input" id="sno" placeholder="學生編號">
    <input class="input" id="sphone" placeholder="家長電話">
    <input class="input" id="savatar" placeholder="大頭貼網址">
    <select class="input" id="courseType">
      <option value="">課程方案</option>
      <option value="常規班">常規班</option>
      <option value="暑期班">暑期班</option>
      <option value="4堂">4堂</option>
      <option value="12堂">12堂</option>
      <option value="24堂">24堂</option>
    </select>
    <div class="section-title">額外資料</div>
    <input class="input" id="sidCard" placeholder="身份證">
    <input class="input" id="school" placeholder="學校">
    <input class="input" id="birthYear" placeholder="出生年份">
    <input class="input" id="gender" placeholder="性別">
    <input class="input" id="address" placeholder="地址">
    <input class="input" id="familyEmail" placeholder="家人Email">
    <textarea class="input" id="note" placeholder="備註" style="height:80px"></textarea>
    <button class="btn" onclick="saveStu()">儲存</button>
  </div>
</div>

<div class="modal" id="artModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>上傳作品</h3>
    <select class="input" id="artStudentSelect"></select>
    <input class="input" id="img" placeholder="圖片網址">
    <input class="input" id="cdate" type="date">
    <input class="input" id="artNote" placeholder="備註">
    <button class="btn" onclick="saveArt()">儲存</button>
  </div>
</div>

<div class="modal" id="courseModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>課程資料</h3>
    <select class="input" id="courseStudentSelect"></select>
    <input class="input" type="date" id="cday">
    <input class="input" type="time" step="300" id="ctime" onchange="calcEndTime()">
    <div id="endTimeShow" style="margin:0 0 15px;color:#879acb"></div>
    <textarea class="input" id="cnote" placeholder="備註"></textarea>
    <input class="input" id="courseImgUrl" placeholder="課程照片鏈接">
    <select class="input" id="cstatus">
      <option value="pending">未完成</option>
      <option value="completed">已完成</option>
      <option value="leave">請假</option>
      <option value="absent">缺席</option>
      <option value="holiday">公眾假期</option>
    </select>
    <div style="margin-top:10px">
      <small>一鍵產生課程：</small>
      <div class="course-package">
        <div class="package-btn" onclick="quickPackage(4)">4堂</div>
        <div class="package-btn" onclick="quickPackage(12)">12堂</div>
        <div class="package-btn" onclick="quickPackage(24)">24堂</div>
      </div>
    </div>
    <button class="btn" onclick="saveCourse()">儲存</button>
  </div>
</div>

<div class="preview" id="preview">
  <span class="close" onclick="closeAll()">&times;</span>
  <div class="prev" onclick="prevImg()">&lt;</div>
  <img id="previewImg">
  <div class="art-info" style="margin-top:10px">
    <p><strong>日期：</strong><span id="pDate"></span></p>
    <p><strong>備註：</strong><span id="pNote"></span></p>
    <button class="btn" style="background:#dc3545" onclick="deleteCurrentArt()">刪除作品</button>
  </div>
  <div class="next" onclick="nextImg()">&gt;</div>
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyBqUEh-MjMZ5Gj2gaFJpKffrDmvP9l7Slo",
  authDomain:"murmurart-8f6cc.firebaseapp.com",
  projectId:"murmurart-8f6cc",
  messagingSenderId:"205741159610",
  appId:"1:205741159610:web:624b7ca35c04e6e09a7e83"
};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const PWD = "teacher123";
let currentStudentId = null;
let currentCourseId = null;
let studentList = [];
let artList = [];
let currentImg = 0;
let courseRaw = [];

function switchTab(role) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('parentLogin').style.display = role==='parent'?'block':'none';
  document.getElementById('teacherLogin').style.display = role==='teacher'?'block':'none';
}
function teacherLogin() {
  if(document.getElementById('pwd').value!==PWD) return alert('密碼錯誤');
  document.getElementById('loginPage').style.display='none';
  document.getElementById('main').style.display='block';
  loadAllStudents();
}
async function parentLogin() {
  const name = document.getElementById('pName').value.trim();
  const phone = document.getElementById('pPhone').value.trim().replace(/\s/g,'');
  if(!name||!phone) return alert('請填寫完整');
  const snap = await db.collection('students').where('name','==',name).get();
  let found = null;
  snap.forEach(doc=>{
    const p = (doc.data().parentPhone||'').replace(/\s/g,'');
    if(p===phone) found=doc.id;
  });
  if(!found) return alert('資訊錯誤');
  location.href=`class.html?sid=${found}`;
}
function show(n) {
  document.getElementById('page1').style.display=n==1?'block':'none';
  document.getElementById('page9').style.display=n==9?'block':'none';
  document.getElementById('page2').style.display=n==2?'block':'none';
  document.getElementById('page3').style.display=n==3?'block':'none';
  if(n==2) loadArtList();
  if(n==3) loadCourseList();
  if(n==9) loadWarningList();
}

async function getLeftCount(sid){
  const courses = await db.collection('courses').where('studentId','==',sid).get();
  const total = courses.size;
  const completed = courses.docs.filter(x=>x.data().status==='completed'||x.data().status==='absent').length;
  return total-completed;
}

async function loadAllStudents() {
  const snap = await db.collection('students').get();
  studentList=[];
  const list=document.getElementById('stuList');
  list.innerHTML='';
  
  for(let doc of snap.docs){
    const s={id:doc.id,...doc.data()};
    const left = await getLeftCount(s.id);
    s.left = left;
    s.warning = left < 3;
    studentList.push(s);
    
    list.innerHTML+=`
    <div class="stu ${s.warning?'warning':''}">
      <img src="${s.avatar||'https://via.placeholder.com/85'}">
      <h3>${s.name}</h3>
      <p>編號：${s.studentNo||'-'}</p>
      <p>家長：${s.parentPhone||'-'}</p>
      <p>方案：${s.courseType||'-'}</p>
      <span class="leftTag">剩餘 ${left} 堂</span>
      ${s.warning?'<p style="color:red;font-weight:bold;margin-top:6px">即將續課</p>':''}
      <div class="action">
        <button onclick="selectStudent('${s.id}')">選取</button>
        <button onclick="editStu('${s.id}')">編輯</button>
        <button onclick="delStu('${s.id}')">刪除</button>
      </div>
    </div>`;
  }
  fillStudentSelects();
}

async function loadWarningList(){
  const w = document.getElementById('warningList');
  w.innerHTML='';
  for(let s of studentList){
    if(s.warning){
      w.innerHTML+=`
      <div class="warningItem">
        <div>
          <strong>${s.name}</strong>｜${s.parentPhone||'-'}｜方案：${s.courseType||'-'}
        </div>
        <div style="color:red;font-weight:bold">剩餘 ${s.left} 堂</div>
      </div>`;
    }
  }
  if(w.innerHTML==='') w.innerHTML='<div style="text-align:center;padding:10px">暫無即將續費學生</div>';
}

function exportCSV(){
  let csv = "姓名,學生編號,家長電話,課程方案,剩餘堂數,身份證,學校,出生年份,性別,地址,Email,備註\n";
  studentList.forEach(s=>{
    csv += `"${s.name}","${s.studentNo||''}","${s.parentPhone||''}","${s.courseType||''}","${s.left||0}","${s.idCard||''}","${s.school||''}","${s.birthYear||''}","${s.gender||''}","${s.address||''}","${s.familyEmail||''}","${s.note||''}"\n`;
  });
  const blob = new Blob([csv],{type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "學生資料.csv";
  a.click();
}

function searchStudent(){
  const kw=document.getElementById('searchStudent').value.toLowerCase();
  const list=document.getElementById('stuList');
  list.innerHTML='';
  studentList.filter(s=>
    s.name.toLowerCase().includes(kw)||
    (s.parentPhone||'').includes(kw)||
    (s.studentNo||'').toLowerCase().includes(kw)
  ).forEach(s=>{
    list.innerHTML+=`
    <div class="stu ${s.warning?'warning':''}">
      <img src="${s.avatar||'https://via.placeholder.com/85'}">
      <h3>${s.name}</h3>
      <p>編號：${s.studentNo||'-'}</p>
      <p>家長：${s.parentPhone||'-'}</p>
      <p>方案：${s.courseType||'-'}</p>
      <span class="leftTag">剩餘 ${s.left||0} 堂</span>
      ${s.warning?'<p style="color:red;font-weight:bold">即將續課</p>':''}
      <div class="action">
        <button onclick="selectStudent('${s.id}')">選取</button>
        <button onclick="editStu('${s.id}')">編輯</button>
        <button onclick="delStu('${s.id}')">刪除</button>
      </div>
    </div>`;
  })
}

function fillStudentSelects() {
  const selArt = document.getElementById('selectStudentForArt');
  const selCourse = document.getElementById('selectStudentForCourse');
  const selArtModal = document.getElementById('artStudentSelect');
  const selCourseModal = document.getElementById('courseStudentSelect');
  [selArt,selCourse,selArtModal,selCourseModal].forEach(sel=>{
    sel.innerHTML='<option value="">選擇學生</option>';
    studentList.forEach(s=>sel.innerHTML+=`<option value="${s.id}">${s.name}</option>`);
  });
}
function selectStudent(id) {
  currentStudentId=id;
  show(2);
  loadArtList();
}
function closeAll(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
  document.getElementById('preview').style.display='none';
}
function addStu(){
  currentStudentId=null;
  document.getElementById('sname').value='';
  document.getElementById('sno').value='';
  document.getElementById('sphone').value='';
  document.getElementById('savatar').value='';
  document.getElementById('courseType').value='';
  document.getElementById('sidCard').value='';
  document.getElementById('school').value='';
  document.getElementById('birthYear').value='';
  document.getElementById('gender').value='';
  document.getElementById('address').value='';
  document.getElementById('familyEmail').value='';
  document.getElementById('note').value='';
  document.getElementById('stuModal').style.display='flex';
}
async function saveStu(){
  const n=document.getElementById('sname').value;
  const no=document.getElementById('sno').value;
  const p=document.getElementById('sphone').value;
  const a=document.getElementById('savatar').value;
  const ct=document.getElementById('courseType').value;
  const idCard=document.getElementById('sidCard').value;
  const school=document.getElementById('school').value;
  const birthYear=document.getElementById('birthYear').value;
  const gender=document.getElementById('gender').value;
  const address=document.getElementById('address').value;
  const familyEmail=document.getElementById('familyEmail').value;
  const note=document.getElementById('note').value;
  if(!n||!p)return;
  const data = {name:n,studentNo:no,parentPhone:p,avatar:a,courseType:ct,idCard,school,birthYear,gender,address,familyEmail,note};
  if(currentStudentId) await db.collection('students').doc(currentStudentId).update(data);
  else await db.collection('students').add({...data,createdAt:new Date()});
  closeAll();
  loadAllStudents();
}
async function delStu(id){
  if(!confirm('確定刪除學生？'))return;
  await db.collection('students').doc(id).delete();
  await db.collection('artworks').where('studentId','==',id).get().then(s=>s.forEach(d=>d.ref.delete()));
  await db.collection('courses').where('studentId','==',id).get().then(s=>s.forEach(d=>d.ref.delete()));
  loadAllStudents();
}
function editStu(id){
  currentStudentId=id;
  db.collection('students').doc(id).get().then(d=>{
    const s=d.data();
    document.getElementById('sname').value=s.name||'';
    document.getElementById('sno').value=s.studentNo||'';
    document.getElementById('sphone').value=s.parentPhone||'';
    document.getElementById('savatar').value=s.avatar||'';
    document.getElementById('courseType').value=s.courseType||'';
    document.getElementById('sidCard').value=s.idCard||'';
    document.getElementById('school').value=s.school||'';
    document.getElementById('birthYear').value=s.birthYear||'';
    document.getElementById('gender').value=s.gender||'';
    document.getElementById('address').value=s.address||'';
    document.getElementById('familyEmail').value=s.familyEmail||'';
    document.getElementById('note').value=s.note||'';
    document.getElementById('stuModal').style.display='flex';
  })
}

function switchArtStudent(){currentStudentId=document.getElementById('selectStudentForArt').value;loadArtList();}
async function loadArtList(){
  if(!currentStudentId)return;
  const g=document.getElementById('rotateWrap');g.innerHTML='';
  const s=await db.collection('students').doc(currentStudentId).get();
  document.getElementById('mainAvatar').src=s.data().avatar||'https://via.placeholder.com/200';
  const arts=await db.collection('artworks').where('studentId','==',currentStudentId).get();
  artList=[];arts.forEach(d=>artList.push({id:d.id,...d.data()}));
  let a=0;const step=360/artList.length;
  artList.forEach((d,i)=>{g.innerHTML+=`<div class="art" style="transform:rotate(${a}deg) translate(220px) rotate(${-a}deg)" onclick="showPreview(${i})"><img src="${d.imageUrl}"></div>`;a+=step});
}
function openArt(){document.getElementById('artModal').style.display='flex'}
async function saveArt(){
  const sid=document.getElementById('artStudentSelect').value;
  const url=document.getElementById('img').value,d=document.getElementById('cdate').value,n=document.getElementById('artNote').value;
  if(!sid||!url||!d)return alert('填寫完整');
  await db.collection('artworks').add({studentId:sid,imageUrl:url,createDate:d,note:n,time:new Date()});
  closeAll();
  loadArtList();
}
function showPreview(i){
  currentImg=i;
  const item=artList[i];
  document.getElementById('previewImg').src=item.imageUrl;
  document.getElementById('pDate').textContent=item.createDate;
  document.getElementById('pNote').textContent=item.note||'無';
  document.getElementById('preview').style.display='block';
}
async function deleteCurrentArt(){
  if(!confirm('確定刪除作品？'))return;
  const id=artList[currentImg].id;
  await db.collection('artworks').doc(id).delete();
  closeAll();loadArtList();
}
function prevImg(){event.stopPropagation();currentImg=(currentImg-1+artList.length)%artList.length;showPreview(currentImg)}
function nextImg(){event.stopPropagation();currentImg=(currentImg+1)%artList.length;showPreview(currentImg)}

function getWeek(d){const w=['日','一','二','三','四','五','六'];return w[new Date(d).getDay()]}
function formatTime(t){const [h,m]=t.split(':');const min=h*60+parseInt(m)+75;const eh=Math.floor(min/60),em=min%60;return `${t} - ${String(eh).padStart(2,0)}:${String(em).padStart(2,0)}`}
function calcEndTime(){
  const t=document.getElementById('ctime').value;
  if(!t)return;
  const [h,m]=t.split(':').map(Number);
  const min=h*60+m+75;
  const eh=Math.floor(min/60),em=min%60;
  document.getElementById('endTimeShow').textContent=`結束時間：${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
}
function searchCourse(){
  const kw=document.getElementById('searchCourse').value.toLowerCase();
  const st=studentList.find(s=>s.studentNo&&s.studentNo.toLowerCase().includes(kw));
  const infoBar=document.getElementById('studentInfoDisplay');
  if(st){
    switchCourseStudentById(st.id);
    infoBar.style.display='block';
    infoBar.innerHTML=`學生：${st.name}｜編號：${st.studentNo||'-'}｜電話：${st.parentPhone||'-'}`;
  }else{
    renderCourseList(courseRaw);
    infoBar.style.display='none';
  }
}
function switchCourseStudentById(id){currentStudentId=id;loadCourseList();}
function switchCourseStudent(){
  currentStudentId=document.getElementById('selectStudentForCourse').value;
  document.getElementById('studentInfoDisplay').style.display='none';
  loadCourseList();
}
async function loadCourseList(){
  if(!currentStudentId)return;
  const courses=await db.collection('courses').where('studentId','==',currentStudentId).get();
  courseRaw=[];courses.forEach(d=>courseRaw.push({id:d.id,...d.data()}));
  renderCourseList(courseRaw);
  updateStats();
}
function updateStats(){
  const total=courseRaw.length;
  const ok=courseRaw.filter(c=>c.status==='completed'||c.status==='absent').length;
  const left=total-ok;
  const rate=total?Math.round(ok/total*100):0;
  document.getElementById('courseStats').innerHTML=`
  <div class="stat"><h3>總課程</h3><h2>${total}</h2></div>
  <div class="stat"><h3>已完成</h3><h2>${ok}</h2></div>
  <div class="stat"><h3>剩餘</h2><h2>${left}</h3></div>
  <div class="stat"><h3>完成率</h3><h2>${rate}%</h2></div>
  `;
}
function renderCourseList(arr){
  const b=document.getElementById('courseList');b.innerHTML='';
  const map={pending:'wait',completed:'ok',leave:'leave',absent:'absent',holiday:'holiday'};
  const txt={pending:'未完成',completed:'已完成',leave:'請假',absent:'缺席',holiday:'公眾假期'};
  arr.sort((a,b)=>{
    if(a.status==='pending' && b.status!=='pending') return -1;
    if(a.status!=='pending' && b.status==='pending') return 1;
    return new Date(a.date)-new Date(b.date);
  });
  arr.forEach(c=>{
    const imgHtml = c.imgUrl ? `<img src="${c.imgUrl}" class="course-img">` : '';
    b.innerHTML+=`<tr>
      <td><input type="checkbox" class="courseCheck" data-id="${c.id}"></td>
      <td>${c.date}（${getWeek(c.date)}）</td>
      <td>${formatTime(c.time)}</td>
      <td><span class="badge ${map[c.status]}">${txt[c.status]}</span></td>
      <td>${imgHtml}</td>
      <td>${c.note||'-'}</td>
      <td>
        <button onclick="editCourse('${c.id}')" style="background:#ffc107;padding:6px 10px;border:none;border-radius:6px;color:white">修改</button>
        <button onclick="delCourse('${c.id}')" style="background:#dc3545;padding:6px 10px;border:none;border-radius:6px;color:white">刪除</button>
      </td>
    </tr>`;
  });
}
async function batchSet(status){
  const checks=document.querySelectorAll('.courseCheck:checked');
  if(checks.length===0)return alert('請選擇課程');
  if(!confirm('確定批量修改？'))return;
  for(let cb of checks){await db.collection('courses').doc(cb.dataset.id).update({status})}
  loadCourseList();
}
async function batchDeleteCourses(){
  const checks=document.querySelectorAll('.courseCheck:checked');
  if(checks.length===0)return alert('請選擇要刪除的課程');
  if(!confirm('確定刪除？'))return;
  for(let cb of checks){await db.collection('courses').doc(cb.dataset.id).delete()}
  loadCourseList();
}
function addCourse(){
  currentCourseId=null;
  document.getElementById('cday').valueAsDate=new Date();
  document.getElementById('ctime').value='';
  document.getElementById('endTimeShow').textContent='';
  document.getElementById('cnote').value='';
  document.getElementById('courseImgUrl').value='';
  document.getElementById('cstatus').value='pending';
  document.getElementById('courseModal').style.display='flex';
}
async function saveCourse(){
  const sid=document.getElementById('courseStudentSelect').value;
  const d=document.getElementById('cday').value;
  const t=document.getElementById('ctime').value;
  const nt=document.getElementById('cnote').value;
  const imgUrl=document.getElementById('courseImgUrl').value;
  const s=document.getElementById('cstatus').value;
  if(!sid||!d||!t)return alert('填寫完整');
  const data = {studentId:sid,date:d,time:t,note:nt,status:s,imgUrl};
  if(currentCourseId) await db.collection('courses').doc(currentCourseId).update(data);
  else await db.collection('courses').add(data);
  closeAll();loadCourseList();
}
function editCourse(id){
  currentCourseId=id;
  db.collection('courses').doc(id).get().then(d=>{
    const c=d.data();
    document.getElementById('courseStudentSelect').value=c.studentId;
    document.getElementById('cday').value=c.date;
    document.getElementById('ctime').value=c.time;
    calcEndTime();
    document.getElementById('cnote').value=c.note||'';
    document.getElementById('courseImgUrl').value=c.imgUrl||'';
    document.getElementById('cstatus').value=c.status;
    document.getElementById('courseModal').style.display='flex';
  })
}
async function delCourse(id){if(!confirm('刪除課程？'))return;await db.collection('courses').doc(id).delete();loadCourseList();}
async function quickPackage(count){
  const sid=document.getElementById('courseStudentSelect').value;
  const startDate=document.getElementById('cday').value;
  const startTime=document.getElementById('ctime').value;
  if(!sid||!startDate||!startTime)return alert('請先選學生、日期、時間');
  if(!confirm('產生 '+count+' 堂課？'))return;
  const start=new Date(startDate);
  for(let i=0;i<count;i++){
    const dd=new Date(start);dd.setDate(start.getDate()+i*7);
    const date=dd.toISOString().split('T')[0];
    await db.collection('courses').add({studentId:sid,date,time:startTime,note:'課程',status:'pending'});
  }
  alert('已產生 '+count+' 堂課');closeAll();loadCourseList();
}
function logout(){location.reload()}
</script>
