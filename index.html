<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MURMUR ART - 登入頁</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體;transition:all 0.25s ease}
    body{background:linear-gradient(120deg,#f5f7fb,#e8edff);background-size:200% 200%;animation:bg 15s infinite;color:#444}
    @keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
    .container{width:90%;max-width:1200px;margin:0 auto;padding:20px 0}
    .login{display:flex;justify-content:center;align-items:center;height:100vh;padding:20px}
    .card{background:white;border-radius:24px;padding:40px;max-width:450px;width:100%;box-shadow:0 12px 40px #879acb2a}
    .title{text-align:center;font-size:30px;color:#879acb;margin-bottom:30px}
    .tabs{display:flex;margin-bottom:20px;border-radius:12px;overflow:hidden}
    .tab{flex:1;padding:12px;text-align:center;cursor:pointer;background:#e8edff;color:#666}
    .tab.active{background:#879acb;color:white}
    .input{width:100%;padding:14px;border:2px solid #e8edff;border-radius:12px;margin-bottom:20px;font-size:16px}
    .btn{width:100%;padding:14px;background:#879acb;color:white;border:none;border-radius:12px;font-size:16px;cursor:pointer}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 15px #879acb60}
    .navbar{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);padding:16px 0;position:sticky;top:0;z-index:99}
    .nav{display:flex;justify-content:space-between;align-items:center}
    .logo{font-size:26px;color:#879acb;font-weight:bold}
    .menu a{margin-left:22px;color:#555;text-decoration:none;cursor:pointer}
    .menu a:hover{color:#879acb}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px}
    .stu{background:white;border-radius:18px;padding:24px;text-align:center;transition:0.3s}
    .stu:hover{transform:translateY(-6px);box-shadow:0 10px 25px #879acb20}
    .stu img{width:85px;height:85px;border-radius:50%;margin-bottom:12px;border:4px solid #879acb}
    .action{margin-top:12px;display:flex;gap:6px;justify-content:center}
    .action button{padding:7px 13px;border:none;border-radius:8px;cursor:pointer}
    .action button:nth-child(1){background:#879acb;color:white}
    .action button:nth-child(2){background:#ffc107;color:white}
    .action button:nth-child(3){background:#dc3545;color:white}
    .gallery{position:relative;width:100%;height:700px;margin:40px 0;display:flex;justify-content:center;align-items:center}
    .avatar{width:200px;height:200px;border-radius:50%;border:8px solid #879acb;position:absolute;z-index:10}
    .rotate{width:450px;height:450px;position:relative;animation:r 25s linear infinite}
    @keyframes r{100%{transform:rotate(360deg)}}
    .art{position:absolute;width:160px;height:160px;border-radius:14px;overflow:hidden;box-shadow:0 8px 20px #00000020;cursor:pointer}
    .art img{width:100%;height:100%;object-fit:cover}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000dd;display:none;justify-content:center;align-items:center;padding:20px;z-index:999}
    .modal .box{background:white;border-radius:20px;padding:35px;max-width:520px;width:100%;position:relative}
    .close{position:absolute;top:18px;right:18px;font-size:22px;cursor:pointer;color:#777}
    .add{position:fixed;bottom:35px;right:35px;width:65px;height:65px;border-radius:50%;background:#879acb;color:white;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .add:hover{transform:scale(1.08);box-shadow:0 8px 20px #879acb60}
    table{width:100%;background:white;border-radius:16px;overflow:hidden;margin-top:20px;box-shadow:0 5px 15px #00000010}
    th{background:#879acb;color:white;padding:16px;text-align:left}
    td{padding:16px;border-bottom:1px solid #e8edff}
    .badge{padding:7px 13px;border-radius:20px;font-size:13px}
    .ok{background:#d4edda;color:#28a745}
    .wait{background:#fff3cd;color:#ffc107}
    .leave{background:#f8d7da;color:#dc3545}
    .course-package{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
    .package-btn{padding:10px 14px;background:#e8edff;border:none;border-radius:8px;cursor:pointer}
    .package-btn.active{background:#879acb;color:white}
    .preview{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:800px;background:white;border-radius:20px;padding:25px;display:none;z-index:9999;box-shadow:0 20px 60px #00000040}
    .preview img{max-width:100%;max-height:400px;border-radius:12px}
    .prev,.next{position:absolute;top:50%;transform:translateY(-50%);font-size:24px;color:white;background:#879acb;padding:10px 18px;border-radius:10px;cursor:pointer}
    .prev{left:15px}
    .next{right:15px}
    .search{width:100%;padding:12px;border:2px solid #e8edff;border-radius:12px;margin-bottom:15px}
    .art-info{margin-top:15px;text-align:left}
    .art-info p{margin:5px 0;color:#555}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginPage" class="login">
  <div class="card">
    <div class="title">MURMUR ART 登入</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('parent')">家長</div>
      <div class="tab" onclick="switchTab('teacher')">老師</div>
    </div>

    <div id="parentLogin">
      <input class="input" id="pName" placeholder="學生姓名">
      <input class="input" id="pPhone" placeholder="家長電話">
      <button class="btn" onclick="parentLogin()">登入</button>
    </div>

    <div id="teacherLogin" style="display:none">
      <input class="input" id="pwd" type="password" placeholder="輸入老師密碼">
      <button class="btn" onclick="teacherLogin()">登入</button>
    </div>
  </div>
</div>

<div id="main" style="display:none">
  <div class="navbar">
    <div class="container nav">
      <div class="logo">MURMUR ART - 老師後台</div>
      <div class="menu">
        <a onclick="show(1)">學生管理</a>
        <a onclick="show(2)">作品管理</a>
        <a onclick="show(3)">課程管理</a>
        <a onclick="logout()">登出</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="page1">
      <h2 style="color:#879acb;margin-bottom:10px">👩‍🎓 學生管理</h2>
      <input class="search" id="searchStudent" placeholder="🔍 搜尋姓名/電話/學生編號" oninput="searchStudent()">
      <button class="btn" style="width:auto;padding:8px 15px" onclick="addStu()">+ 新增學生</button>
      <div class="grid" id="stuList"></div>
    </div>

    <div id="page2" style="display:none">
      <h2 style="color:#879acb;margin-bottom:10px">🎨 作品管理</h2>
      <select class="input" id="selectStudentForArt" onchange="switchArtStudent()"></select>
      <div class="gallery" id="gallery">
        <img class="avatar" id="mainAvatar" src="https://via.placeholder.com/200">
        <div class="rotate" id="rotateWrap"></div>
      </div>
      <div class="add" onclick="openArt()">+</div>
    </div>

    <div id="page3" style="display:none">
      <h2 style="color:#879acb;margin-bottom:10px">📅 課程管理</h2>
      <select class="input" id="selectStudentForCourse" onchange="switchCourseStudent()"></select>
      <button class="btn" style="width:auto;padding:8px 15px" onclick="addCourse()">+ 新增 / 產生課程</button>
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>時間</th>
            <th>狀態</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="courseList"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="stuModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>學生資料</h3>
    <input class="input" id="sname" placeholder="姓名">
    <input class="input" id="sno" placeholder="學生編號">
    <input class="input" id="sphone" placeholder="家長電話">
    <input class="input" id="savatar" placeholder="大頭貼網址">
    <button class="btn" onclick="saveStu()">儲存</button>
  </div>
</div>

<div class="modal" id="artModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>上傳作品</h3>
    <select class="input" id="artStudentSelect"></select>
    <input class="input" id="img" placeholder="圖片網址">
    <input class="input" id="cdate" type="date">
    <input class="input" id="artNote" placeholder="備註">
    <button class="btn" onclick="saveArt()">儲存</button>
  </div>
</div>

<div class="modal" id="courseModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>課程</h3>
    <select class="input" id="courseStudentSelect"></select>
    <input class="input" type="date" id="cday">
    <input class="input" type="time" step="300" id="ctime" onchange="calcEndTime()">
    <div id="endTimeShow" style="margin:-10px 0 15px;color:#879acb"></div>
    <textarea class="input" id="cnote" placeholder="備註"></textarea>
    <select class="input" id="cstatus">
      <option>pending</option>
      <option>completed</option>
      <option>leave</option>
    </select>
    <div style="margin-top:10px">
      <small>一鍵產生課程：</small>
      <div class="course-package">
        <div class="package-btn" onclick="quickPackage(4)">4堂</div>
        <div class="package-btn" onclick="quickPackage(12)">12堂</div>
        <div class="package-btn" onclick="quickPackage(24)">24堂</div>
      </div>
    </div>
    <button class="btn" onclick="saveCourse()">儲存單一課程</button>
  </div>
</div>

<div class="preview" id="preview">
  <span class="close" onclick="closeAll()">&times;</span>
  <div class="prev" onclick="prevImg()">&lt;</div>
  <img id="previewImg">
  <div class="art-info">
    <p><strong>日期：</strong><span id="pDate"></span></p>
    <p><strong>備註：</strong><span id="pNote"></span></p>
  </div>
  <div class="next" onclick="nextImg()">&gt;</div>
</div>

<script>
const firebaseConfig = {apiKey:"AIzaSyBqUEh-MjMZ5Gj2gaFJpKffrDmvP9l7Slo",authDomain:"murmurart-8f6cc.firebaseapp.com",projectId:"murmurart-8f6cc",messagingSenderId:"205741159610",appId:"1:205741159610:web:624b7ca35c04e6e09a7e83"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const PWD = "teacher123";
let currentStudentId = null;
let currentCourseId = null;
let studentList = [];
let artList = [];
let currentImg = 0;

function switchTab(role) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('parentLogin').style.display = role==='parent'?'block':'none';
  document.getElementById('teacherLogin').style.display = role==='teacher'?'block':'none';
}

function teacherLogin() {
  if(document.getElementById('pwd').value!==PWD) return alert('密碼錯誤');
  document.getElementById('loginPage').style.display='none';
  document.getElementById('main').style.display='block';
  loadAllStudents();
}

async function parentLogin() {
  const name = document.getElementById('pName').value.trim();
  const phone = document.getElementById('pPhone').value.trim().replace(/\s/g,'');
  if(!name||!phone) return alert('請填寫完整');
  
  const snap = await db.collection('students').where('name','==',name).get();
  let found = null;
  snap.forEach(doc=>{
    const p = (doc.data().parentPhone||'').replace(/\s/g,'');
    if(p===phone) found=doc.id;
  });
  if(!found) return alert('資訊錯誤');
  location.href=`class.html?sid=${found}`;
}

function show(n) {
  document.getElementById('page1').style.display=n==1?'block':'none';
  document.getElementById('page2').style.display=n==2?'block':'none';
  document.getElementById('page3').style.display=n==3?'block':'none';
  if(n==2) loadArtList();
  if(n==3) loadCourseList();
}

async function loadAllStudents() {
  const snap = await db.collection('students').get();
  studentList=[];
  const list=document.getElementById('stuList');
  list.innerHTML='';
  snap.forEach(doc=>{
    const s={id:doc.id,...doc.data()};
    studentList.push(s);
    list.innerHTML+=`<div class="stu"><img src="${s.avatar||'https://via.placeholder.com/85'}"><h3>${s.name}</h3><p>編號：${s.studentNo||'-'}</p><p>家長：${s.parentPhone||'-'}</p><div class="action"><button onclick="selectStudent('${s.id}')">選取</button><button onclick="editStu('${s.id}')">編輯</button><button onclick="delStu('${s.id}')">刪除</button></div></div>`;
  });
  fillStudentSelects();
}

function searchStudent(){
  const kw=document.getElementById('searchStudent').value.toLowerCase();
  const list=document.getElementById('stuList');
  list.innerHTML='';
  studentList.filter(s=>
    s.name.toLowerCase().includes(kw)||
    (s.parentPhone||'').includes(kw)||
    (s.studentNo||'').toLowerCase().includes(kw)
  ).forEach(s=>{
    list.innerHTML+=`<div class="stu"><img src="${s.avatar||'https://via.placeholder.com/85'}"><h3>${s.name}</h3><p>編號：${s.studentNo||'-'}</p><p>家長：${s.parentPhone||'-'}</p><div class="action"><button onclick="selectStudent('${s.id}')">選取</button><button onclick="editStu('${s.id}')">編輯</button><button onclick="delStu('${s.id}')">刪除</button></div></div>`;
  })
}

function fillStudentSelects() {
  const selArt = document.getElementById('selectStudentForArt');
  const selCourse = document.getElementById('selectStudentForCourse');
  const selArtModal = document.getElementById('artStudentSelect');
  const selCourseModal = document.getElementById('courseStudentSelect');
  [selArt,selCourse,selArtModal,selCourseModal].forEach(sel=>{
    sel.innerHTML='<option value="">選擇學生</option>';
    studentList.forEach(s=>sel.innerHTML+=`<option value="${s.id}">${s.name}</option>`);
  });
}

function selectStudent(id) {
  currentStudentId=id;
  show(2);
  loadArtList();
}

function closeAll(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
  document.getElementById('preview').style.display='none';
}

function addStu(){currentStudentId=null;document.getElementById('sname').value='';document.getElementById('sno').value='';document.getElementById('sphone').value='';document.getElementById('savatar').value='';document.getElementById('stuModal').style.display='flex'}
async function saveStu(){
  const n=document.getElementById('sname').value,no=document.getElementById('sno').value,p=document.getElementById('sphone').value,a=document.getElementById('savatar').value;
  if(!n||!p)return;
  if(currentStudentId) await db.collection('students').doc(currentStudentId).update({name:n,studentNo:no,parentPhone:p,avatar:a});
  else await db.collection('students').add({name:n,studentNo:no,parentPhone:p,avatar:a,createdAt:new Date()});
  closeAll();
  loadAllStudents();
}
async function delStu(id){if(!confirm('確定刪除學生？'))return;await db.collection('students').doc(id).delete();await db.collection('artworks').where('studentId','==',id).get().then(s=>s.forEach(d=>d.ref.delete()));await db.collection('courses').where('studentId','==',id).get().then(s=>s.forEach(d=>d.ref.delete()));loadAllStudents();}
function editStu(id){currentStudentId=id;db.collection('students').doc(id).get().then(d=>{const s=d.data();document.getElementById('sname').value=s.name;document.getElementById('sno').value=s.studentNo||'';document.getElementById('sphone').value=s.parentPhone||'';document.getElementById('savatar').value=s.avatar||'';document.getElementById('stuModal').style.display='flex'})}

function switchArtStudent(){currentStudentId=document.getElementById('selectStudentForArt').value;loadArtList();}
async function loadArtList(){
  if(!currentStudentId)return;
  const g=document.getElementById('rotateWrap');g.innerHTML='';
  const s=await db.collection('students').doc(currentStudentId).get();
  document.getElementById('mainAvatar').src=s.data().avatar||'https://via.placeholder.com/200';
  const arts=await db.collection('artworks').where('studentId','==',currentStudentId).get();
  artList=[];arts.forEach(d=>artList.push({id:d.id,...d.data()}));
  let a=0;const step=360/artList.length;
  artList.forEach((d,i)=>{g.innerHTML+=`<div class="art" style="transform:rotate(${a}deg) translate(220px) rotate(${-a}deg)" onclick="showPreview(${i})"><img src="${d.imageUrl}"></div>`;a+=step});
}
function openArt(){document.getElementById('artModal').style.display='flex'}
async function saveArt(){
  const sid=document.getElementById('artStudentSelect').value;
  const url=document.getElementById('img').value,d=document.getElementById('cdate').value,n=document.getElementById('artNote').value;
  if(!sid||!url||!d)return alert('填寫完整');
  await db.collection('artworks').add({studentId:sid,imageUrl:url,createDate:d,note:n,time:new Date()});
  closeAll();
  loadArtList();
}
function showPreview(i){
  currentImg=i;
  const item=artList[i];
  document.getElementById('previewImg').src=item.imageUrl;
  document.getElementById('pDate').textContent=item.createDate;
  document.getElementById('pNote').textContent=item.note||'無';
  document.getElementById('preview').style.display='block';
}
function prevImg(){event.stopPropagation();currentImg=(currentImg-1+artList.length)%artList.length;showPreview(currentImg)}
function nextImg(){event.stopPropagation();currentImg=(currentImg+1)%artList.length;showPreview(currentImg)}

function calcEndTime(){
  const t=document.getElementById('ctime').value;
  if(!t)return;
  const [h,m]=t.split(':').map(Number);
  const min=h*60+m+75;
  const eh=Math.floor(min/60),em=min%60;
  document.getElementById('endTimeShow').textContent=`結束時間：${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
}

function switchCourseStudent(){currentStudentId=document.getElementById('selectStudentForCourse').value;loadCourseList();}
async function loadCourseList(){
  if(!currentStudentId)return;
  const b=document.getElementById('courseList');b.innerHTML='';
  const courses=await db.collection('courses').where('studentId','==',currentStudentId).get();
  const t={pending:'wait',completed:'ok',leave:'leave'},n={pending:'未完成',completed:'已完成',leave:'請假'};
  let arr=[];courses.forEach(d=>arr.push({id:d.id,...d.data()}));
  arr.sort((a,b)=>{
    if(a.status==='completed')return -1;
    if(b.status==='completed')return 1;
    return new Date(a.date)-new Date(b.date);
  });
  arr.forEach(c=>{
    b.innerHTML+=`<tr><td>${c.date}</td><td>${c.time}</td><td><span class="badge ${t[c.status]}">${n[c.status]}</span></td><td>${c.note||'-'}</td><td><button onclick="editCourse('${c.id}')" style="background:#ffc107;color:white;padding:6px 10px;border:none;border-radius:6px;cursor:pointer">修改</button> <button onclick="delCourse('${c.id}')" style="background:#dc3545;color:white;padding:6px 10px;border:none;border-radius:6px;cursor:pointer">刪除</button></td></tr>`;
  });
}
function addCourse(){currentCourseId=null;document.getElementById('cday').valueAsDate=new Date();document.getElementById('ctime').value='';document.getElementById('endTimeShow').textContent='';document.getElementById('cnote').value='';document.getElementById('cstatus').value='pending';document.getElementById('courseModal').style.display='flex'}
async function saveCourse(){
  const sid=document.getElementById('courseStudentSelect').value;
  const d=document.getElementById('cday').value,t=document.getElementById('ctime').value,nt=document.getElementById('cnote').value,s=document.getElementById('cstatus').value;
  if(!sid||!d||!t)return alert('填寫完整');
  if(currentCourseId) await db.collection('courses').doc(currentCourseId).update({studentId:sid,date:d,time:t,note:nt,status:s});
  else await db.collection('courses').add({studentId:sid,date:d,time:t,note:nt,status:s});
  closeAll();
  loadCourseList();
}
function editCourse(id){currentCourseId=id;db.collection('courses').doc(id).get().then(d=>{const c=d.data();document.getElementById('courseStudentSelect').value=c.studentId;document.getElementById('cday').value=c.date;document.getElementById('ctime').value=c.time;calcEndTime();document.getElementById('cnote').value=c.note||'';document.getElementById('cstatus').value=c.status;document.getElementById('courseModal').style.display='flex'})}
async function delCourse(id){if(!confirm('刪除課程？'))return;await db.collection('courses').doc(id).delete();loadCourseList();}

async function quickPackage(count){
  const sid=document.getElementById('courseStudentSelect').value;
  const startDate=document.getElementById('cday').value;
  const startTime=document.getElementById('ctime').value;
  if(!sid||!startDate||!startTime)return alert('請先選學生、日期、時間');
  if(!confirm('產生 '+count+' 堂課？'))return;
  const start=new Date(startDate);
  for(let i=0;i<count;i++){
    const dd=new Date(start);dd.setDate(start.getDate()+i*7);
    const date=dd.toISOString().split('T')[0];
    await db.collection('courses').add({studentId:sid,date,time:startTime,note:'課程',status:'pending'});
  }
  alert('已產生 '+count+' 堂課');
  closeAll();
  loadCourseList();
}

function logout(){location.reload()}
</script>
</body>
</html>
function logout(){location.reload()}
</script>
</body>
</html>
