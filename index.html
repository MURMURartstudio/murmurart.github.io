<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png">
  <title>MURMUR ART 學生/家長區 - 版本2</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體,"Noto Sans TC"}
    body{background:linear-gradient(120deg,#fdfbf7,#f0e9ff);color:#444}
    .container{width:90%;max-width:1200px;margin:0 auto}
    .login{display:flex;justify-content:center;align-items:center;height:100vh;padding:20px}
    .card{background:white;border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:0 12px 40px #879acb2a}
    .title{text-align:center;font-size:30px;color:#879acb;margin-bottom:30px}
    .tabs{display:flex;margin-bottom:20px;border-radius:12px;overflow:hidden}
    .tab{flex:1;padding:12px;text-align:center;cursor:pointer;background:#e8edff;color:#666}
    .tab.active{background:#879acb;color:white}
    .input{width:100%;padding:14px;border:2px solid #e8edff;border-radius:12px;margin-bottom:16px;font-size:16px}
    .btn{width:100%;padding:14px;background:#879acb;color:white;border:none;border-radius:12px;font-size:16px;cursor:pointer}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 15px #879acb60}
    .navbar{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);padding:16px 0;position:sticky;top:0;z-index:99}
    .nav{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
    .logo{font-size:26px;color:#879acb;font-weight:bold}
    .menu{display:flex;gap:16px;flex-wrap:wrap}
    .menu a{color:#555;text-decoration:none;cursor:pointer;padding:4px 2px}
    .menu a:hover{color:#879acb}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px}
    .stu{background:white;border-radius:18px;padding:24px;text-align:center;position:relative;box-shadow:0 4px 12px #0000000a}
    .stu.warning{border:2px solid #ff9800}
    .stu img{width:85px;height:85px;border-radius:50%;margin-bottom:12px;border:4px solid #879acb}
    .stu .leftTag{background:#ff9800;color:white;padding:4px 8px;border-radius:10px;font-size:12px;margin-top:6px;display:inline-block}
    .action{margin-top:12px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .action button{padding:7px 13px;border:none;border-radius:8px;cursor:pointer}
    .action button:nth-child(1){background:#879acb;color:white}
    .action button:nth-child(2){background:#ffc107;color:white}
    .action button:nth-child(3){background:#dc3545;color:white}

    .art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-top:20px}
    .art-card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 12px #00000010;cursor:pointer}
    .art-card img{width:100%;height:180px;object-fit:cover}
    .art-info{padding:10px;font-size:12px;color:#666}
    .gallery{margin:30px 0}
    .student-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
    .student-header img{width:100px;height:100px;border-radius:50%;border:4px solid #879acb}

    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000dd;display:none;justify-content:center;align-items:center;padding:20px;z-index:9999}
    .modal .box{background:white;border-radius:20px;padding:35px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto}
    .close{position:absolute;top:18px;right:18px;font-size:22px;cursor:pointer;color:#777}
    .add{position:fixed;bottom:35px;right:35px;width:65px;height:65px;border-radius:50%;background:#879acb;color:white;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    table{width:100%;background:white;border-radius:16px;overflow:hidden;margin-top:20px}
    th{background:#879acb;color:white;padding:16px;text-align:left}
    td{padding:16px;border-bottom:1px solid #e8edff}
    .badge{padding:7px 13px;border-radius:20px;font-size:13px}
    .ok{background:#d4edda;color:#28a745}
    .wait{background:#fff3cd;color:#ffc107}
    .leave{background:#f8d7da;color:#dc3545}
    .absent{background:#333;color:#fff}
    .holiday{background:#d1ecf1;color:#17a2b8}
    .course-package{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
    .package-btn{padding:10px 14px;background:#e8edff;border:none;border-radius:8px;cursor:pointer}
    .preview{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:95%;max-width:1200px;background:white;border-radius:20px;padding:25px;display:none;z-index:9999}
    .preview img{max-width:100%;max-height:70vh;border-radius:12px;object-fit:contain}
    .prev,.next{position:absolute;top:50%;transform:translateY(-50%);font-size:24px;color:white;background:#879acb;padding:10px 18px;border-radius:10px;cursor:pointer}
    .prev{left:15px}
    .next{right:15px}
    .search{width:100%;padding:12px;border:2px solid #e8edff;border-radius:12px;margin-bottom:15px}
    .stats{background:white;padding:20px;border-radius:16px;display:flex;gap:15px;text-align:center;margin:15px 0}
    .stat{flex:1}

    /* 日曆 - 縮小版 手機友善 */
    .calendar{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:3px;
      margin:10px 0;
      font-size:11px;
    }
    .calendar-header{
      background:#879acb;
      color:white;
      padding:4px;
      text-align:center;
      border-radius:4px;
      font-weight:bold;
      font-size:11px;
    }
    .calendar-day{
      background:white;
      border-radius:6px;
      padding:4px;
      min-height:45px;
      border:1px solid #e8edff;
      cursor:pointer;
    }
    .calendar-day.active{
      background:#e8edff;
      border-color:#879acb;
    }
    .calendar-day-num{
      font-weight:bold;
      margin-bottom:2px;
      color:#879acb;
      font-size:11px;
    }
    .calendar-item{
      font-size:10px;
      padding:2px 4px;
      background:#f8f9ff;
      border-radius:4px;
      margin-bottom:3px;
      white-space:nowrap;
      overflow:hidden;
    }

    /* 時間表 */
    .day-schedule{
      background:white;
      padding:12px;
      border-radius:12px;
      margin-bottom:12px;
      box-shadow:0 2px 8px #0000000a;
    }
    .schedule-item{
      padding:8px 10px;
      border-bottom:1px solid #e8edff;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:13px;
    }
    .schedule-left{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .schedule-time{
      font-weight:bold;
      color:#879acb;
      min-width:60px;
    }
    .schedule-name{
      font-weight:bold;
    }
    .schedule-no{
      color:#777;
      font-size:11px;
    }
    .schedule-btgs{
      padding:4px 6px;
      border-radius:6px;
      font-size:11px;
      color:white;
    }
    .schedule-btns button{
      padding:5px 8px;
      border:none;
      border-radius:6px;
      color:white;
      font-size:11px;
      margin-left:3px;
    }

    /* 學生資訊卡片 */
    .student-info-card{
      background:white;
      padding:16px;
      border-radius:14px;
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      box-shadow:0 4px 12px #0000000a;
    }
    .student-info-card img{
      width:60px;height:60px;border-radius:50%;
      border:4px solid #879acb;
    }
    .student-info-text h3{
      color:#879acb;
      margin-bottom:4px;
      font-size:16px;
    }
    .student-info-text p{
      color:#666;
      font-size:13px;
      margin:2px 0;
    }

    /* 批量按鈕 */
    .batch-bar{margin:10px 0;padding:10px;background:#f8f9ff;border-radius:12px}
    .batch-btn{padding:8px 12px;border:none;border-radius:8px;margin-right:5px;color:white}
    .btn-ok{background:#28a745}
    .btn-wait{background:#ffc107}
    .btn-leave{background:#dc3545}
    .btn-absent{background:#333}
    .btn-holiday{background:#17a2b8}
    .btn-del{background:#dc3545}

    .student-info-bar{background:#fff3cd;padding:12px 15px;border-radius:12px;margin-bottom:10px;font-size:15px;display:none}
    .course-img{max-width:120px;max-height:80px;border-radius:8px;margin-top:6px}
    .section-title{font-size:16px;color:#879acb;margin:10px 0 6px;font-weight:bold}
    .export-btn{background:#17a2b8;color:white;padding:8px 16px;border:none;border-radius:8px;margin-left:10px}
    .warningPage{background:#fff3cd;padding:15px;border-radius:16px;margin:15px 0}
    .warningItem{background:white;padding:12px;border-radius:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .imgbb-link{display:inline-block;margin-top:8px;color:#879acb;text-decoration:underline;font-size:14px}

    /* 時間表狀態顏色 */
    .status-completed{background:#28a745;color:white;padding:3px 6px;border-radius:4px;font-size:11px;}
    .status-pending{background:#ffc107;color:#333;padding:3px 6px;border-radius:4px;font-size:11px;}
    .status-leave{background:#dc3545;color:white;padding:3px 6px;border-radius:4px;font-size:11px;}
    .status-absent{background:#000;color:white;padding:3px 6px;border-radius:4px;font-size:11px;}
    .status-holiday{background:#17a2b8;color:white;padding:3px 6px;border-radius:4px;font-size:11px;}

    /* 列印專用 */
    @media print{
      body * { visibility: hidden; }
      #timeTableView, #timeTableView * { visibility: visible; }
      #timeTableView { position: absolute; left: 0; top: 0; width: 100%; }
    }

    /* 分頁樣式 */
    .pagination{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin:20px 0;
    }
    .page-btn{
      padding:8px 14px;
      background:#e8edff;
      color:#555;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }
    .page-btn:disabled{
      opacity:0.5;
      cursor:not-allowed;
    }
    .page-info{
      font-size:14px;
      color:#666;
    }

    /* 新月曆排版 */
    .calendar-wrapper{
      display:flex;
      gap:15px;
      margin-bottom:15px;
      align-items:flex-start;
    }
    .calendar-left{
      width:260px;
      background:white;
      padding:12px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
    }
    .calendar-right{
      flex:1;
      background:white;
      padding:12px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
      max-height:none;
      overflow-y:visible;
    }
    .month-selector{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }
    .month-selector select{
      padding:6px 10px;
      border-radius:8px;
      border:1px solid #e8edff;
    }
    .time-row{
      display:flex;
      align-items:flex-start;
      padding:6px 8px;
      border-bottom:1px solid #f0f0f0;
      min-height:38px;
    }
    .time-label{
      width:60px;
      font-weight:bold;
      color:#879acb;
      font-size:12px;
      padding-top:4px;
    }
    .time-slots{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:4px;
      padding-bottom:2px;
    }
    .course-block{
      padding:6px 8px;
      background:#e8edff;
      border-radius:6px;
      font-size:11px;
      border-left:3px solid #879acb;
      white-space:nowrap;
      min-width:130px;
      cursor:pointer;
      position:relative;
      margin:0;
    }
    .course-block:hover{
      background:#d7e0ff;
    }
    .course-status-menu{
      position:absolute;
      bottom:-38px;
      left:0;
      background:white;
      border-radius:6px;
      box-shadow:0 2px 8px #00000022;
      padding:4px;
      z-index:10;
      display:flex;
      gap:3px;
    }
    .course-status-menu button{
      padding:3px 5px;
      font-size:10px;
      border:none;
      border-radius:4px;
      color:white;
      cursor:pointer;
    }
    .quick-edit-panel{
      position:fixed;
      right:20px;
      top:50%;
      transform:translateY(-50%);
      background:white;
      padding:15px;
      border-radius:12px;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
      z-index:999;
      width:180px;
      display:none;
    }
    .quick-edit-panel h4{
      font-size:14px;
      color:#879acb;
      margin-bottom:10px;
    }
    .quick-btn{
      width:100%;
      padding:6px;
      margin:3px 0;
      border:none;
      border-radius:6px;
      color:white;
      font-size:12px;
      cursor:pointer;
    }

    /* 老師界面：同一時間學生左右排列 */
    .time-slots {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: wrap !important;
      gap: 6px !important;
    }
    .course-block {
      margin: 0 !important;
      flex: 1 !important;
      min-width: 140px !important;
      max-width: 220px !important;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginPage" class="login">
  <div class="card">
    <div class="title">🎨 MURMUR ART 登入</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('parent')">家長</div>
      <div class="tab" onclick="switchTab('teacher')">老師</div>
    </div>

    <div id="parentLogin">
      <input class="input" id="pName" placeholder="學生姓名">
      <input class="input" id="pPhone" placeholder="家長電話">
      <button class="btn" onclick="parentLogin()">登入</button>
    </div>

    <div id="teacherLogin" style="display:none">
      <input class="input" id="adminPwd" placeholder="請輸入老師密碼" type="password">
      <button class="btn" onclick="teacherLogin()">登入後台</button>
    </div>
  </div>
</div>

<div id="main" style="display:none">
  <div class="navbar">
    <div class="container nav">
      <div class="logo">MURMUR ART 後台</div>
      <div class="menu">
        <a onclick="show(1)">學生管理</a>
        <a onclick="show(2)">作品管理</a>
        <a onclick="show(3)">課程管理</a>
        <a onclick="logout()">登出</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="page1">
      <h2 style="margin-bottom:10px">學生管理</h2>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        <input class="search" id="searchStudent" placeholder="搜尋姓名/電話/編號" oninput="searchStudent()" style="margin:0;flex:1">
        <button class="btn" style="width:auto;padding:8px 15px" onclick="addStu()">+ 新增學生</button>
        <button class="export-btn" onclick="exportCSV()">匯出 CSV</button>
        <button class="btn" style="width:auto;padding:8px 15px;background:#6c757d" onclick="sortStudentAZ()">A→Z 排序</button>
      </div>
      <div class="grid" id="stuList"></div>
      <div id="stuPagination" class="pagination"></div>
    </div>

    <div id="page2" style="display:none">
      <h2 style="margin-bottom:10px">作品管理</h2>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        <input class="search" id="searchArt" placeholder="搜尋姓名/電話/編號" oninput="searchArt()" style="margin:0;flex:1">
        <select class="input" id="selectStudentForArt" onchange="switchArtStudent()" style="flex:1"></select>
      </div>
      <div class="gallery">
        <div class="student-header" id="artStudentHeader" style="display:none">
          <img id="artAvatar" src="">
          <div>
            <h3 id="artStudentName"></h3>
          </div>
        </div>
        <div class="art-grid" id="artGrid"></div>
      </div>
      <div id="artPagination" class="pagination"></div>
      <div class="add" onclick="openArt()">+</div>
    </div>

    <div id="page3" style="display:none">
      <h2 style="margin-bottom:10px">課程管理</h2>

      <div id="studentInfoCard" class="student-info-card" style="display:none;">
        <img id="cardAvatar">
        <div class="student-info-text">
          <h3 id="cardName"></h3>
          <p id="cardNo"></p>
          <p id="cardCourseType"></p>
          <p id="cardLeft"></p>
        </div>
      </div>

      <select class="input" id="selectStudentForCourse" onchange="switchCourseStudent()"></select>
      <input class="search" id="searchCourse" placeholder="搜尋姓名/電話/編號" oninput="searchCourse()" style="margin:0;flex:1">
      <div id="studentInfoDisplay" class="student-info-bar"></div>
      <button class="btn" style="width:auto;padding:8px 15px" onclick="addCourse()">+ 新增課程</button>
      <button class="export-btn" onclick="printSchedule()">下載／列印時間表</button>

      <div class="calendar-wrapper">
        <div class="calendar-left">
          <div class="month-selector">
            <span>📅 選擇月份</span>
            <select id="monthSelect" onchange="onMonthChange()"></select>
          </div>
          <div id="smallCalendar" class="calendar"></div>
        </div>
        <div class="calendar-right">
          <h4 style="margin-bottom:8px;color:#879acb;font-size:14px">⏰ 當日課程時間表</h4>
          <div id="timeTableView"></div>
        </div>
      </div>

      <div class="stats" id="courseStats"></div>
      <div class="batch-bar">
        <small>批量操作：</small>
        <button class="batch-btn btn-wait" onclick="batchSet('pending')">未完成</button>
        <button class="batch-btn btn-ok" onclick="batchSet('completed')">已完成</button>
        <button class="batch-btn btn-leave" onclick="batchSet('leave')">請假</button>
        <button class="batch-btn btn-absent" onclick="batchSet('absent')">缺席</button>
        <button class="batch-btn btn-holiday" onclick="batchSet('holiday')">假期</button>
        <button class="batch-btn btn-del" onclick="batchDeleteCourses()">批量刪除</button>
      </div>
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="checkAll" onclick="toggleAllCheck()"></th>
            <th>日期</th>
            <th>時間</th>
            <th>狀態</th>
            <th>課程類型</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="courseList"></tbody>
      </table>
      <div id="coursePagination" class="pagination"></div>
    </div>
  </div>
</div>

<div class="quick-edit-panel" id="quickEditPanel">
  <h4 id="quickEditTitle">快速編輯</h4>
  <button class="quick-btn" style="background:#28a745" onclick="saveQuickStatus('completed')">已完成</button>
  <button class="quick-btn" style="background:#ffc107" onclick="saveQuickStatus('pending')">未完成</button>
  <button class="quick-btn" style="background:#dc3545" onclick="saveQuickStatus('leave')">請假</button>
  <button class="quick-btn" style="background:#333" onclick="saveQuickStatus('absent')">缺席</button>
  <button class="quick-btn" style="background:#17a2b8" onclick="saveQuickStatus('holiday')">假期</button>
</div>

<div class="modal" id="stuModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>學生資料</h3>
    <input class="input" id="sname" placeholder="姓名">
    <input class="input" id="sno" placeholder="學生編號">
    <input class="input" id="sphone" placeholder="家長電話">
    <input class="input" id="savatar" placeholder="貼上圖片連結（ImgBB/Google 相簿都可）">
    <select class="input" id="courseType">
      <option value="">課程方案</option>
      <option value="常規班">常規班</option>
      <option value="暑期班">暑期班</option>
      <option value="4堂">4堂</option>
      <option value="12堂">12堂</option>
      <option value="24堂">24堂</option>
    </select>
    <div class="section-title">基本資料</div>
    <input class="input" id="school" placeholder="學校">
    <input class="input" id="birthYear" placeholder="出生年份">
    <input class="input" id="gender" placeholder="性別">
    <textarea class="input" id="note" placeholder="備註" style="height:80px"></textarea>
    <button class="btn" onclick="saveStu()">儲存</button>
  </div>
</div>

<div class="modal" id="artModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>上傳作品</h3>
    <select class="input" id="artStudentSelect"></select>
    <input class="input" id="img" placeholder="貼上圖片連結（ImgBB/Google 相簿都可）">
    <a href="https://imgbb.com/" target="_blank" class="imgbb-link">→ 開啟 ImgBB 上傳圖片</a>
    <input class="input" id="cdate" type="date">
    <input class="input" id="artNote" placeholder="備註">
    <button class="btn" onclick="saveArt()">儲存</button>
  </div>
</div>

<div class="modal" id="courseModal">
  <div class="box">
    <span class="close" onclick="closeAll()">&times;</span>
    <h3>課程資料</h3>
    <select class="input" id="courseStudentSelect" disabled></select>
    <input class="input" type="date" id="cday">
    
    <div style="display:flex;gap:10px;">

async function getDirectImageUrl(url) {
  if (!url) return "https://via.placeholder.com/300";
  let imgbbMatch = url.match(/ibb\.co\/([a-zA-Z0-9]+)/);
  if (imgbbMatch) return `https://i.ibb.co/${imgbbMatch[1]}/image.jpg`;
  if (url.includes("i.ibb.co") && (url.endsWith(".jpg")||url.endsWith(".png")||url.endsWith(".jpeg"))) return url;
  let driveMatch = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if (driveMatch) return "https://drive.google.com/thumbnail?id="+driveMatch[1]+"&sz=w1000";
  if (url.includes("photos.app.goo.gl")) {
    try{const res=await fetch(url,{mode:"cors"});const t=await res.text();const f=t.match(/https:\/\/lh3\.googleusercontent\.com\/[^\s"]+/);if(f)return f[0]}catch(e){}
  }
  if (url.includes("lh3.googleusercontent.com")) return url;
  if (url.endsWith(".jpg")||url.endsWith(".png")||url.endsWith(".jpeg")||url.endsWith(".gif")) return url;
  return "https://via.placeholder.com/300";
}

function renderSmallCalendar(){
  const year = selectedYear;
  const month = selectedMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const cal = document.getElementById('smallCalendar');
  cal.innerHTML = '';

  const week = ['日','一','二','三','四','五','六'];
  week.forEach(w=>{
    cal.innerHTML += `<div class="calendar-header">${w}</div>`;
  });

  for(let i=0;i<firstDay;i++) cal.innerHTML += `<div class="calendar-day"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const date = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasCourse = allCourses.some(x=>x.date===date);
    const isToday = date === selectedDate;
    cal.innerHTML += `
    <div class="calendar-day ${hasCourse?'active':''} ${isToday?'style="background:#e8edff"':''}" onclick="selectCalendarDate('${date}')">
      <div class="calendar-day-num">${d}</div>
    </div>`;
  }
}

// Google 風格時間表 → 整點排版（你要求的新版本）
function renderTimeTable(){
  const container = document.getElementById('timeTableView');
  container.innerHTML = '';

  const targetDate = selectedDate;
  const todayCourses = allCourses.filter(x=>x.date===targetDate);
  
  // 建立 09:00 ~ 21:00 整點時段
  const timeSlots = [];
  for (let h = 9; h <= 21; h++) {
    timeSlots.push(`${String(h).padStart(2, '0')}:00`);
  }

  // 把課程依照「整點」分組
  const grouped = {};
  timeSlots.forEach(time => {
    grouped[time] = todayCourses.filter(c => {
      return c.time.startsWith(time.slice(0, 2)); // 比對小時（9:xx 歸 9:00）
    });
  });

  // 逐行輸出：每整點一行
  timeSlots.forEach(time => {
    const courses = grouped[time];
    if (courses.length === 0) {
      // 空時段仍保留行高，保持排版整齊
      container.innerHTML += `
        <div class="time-row">
          <div class="time-label">${time}</div>
          <div class="time-slots"></div>
        </div>
      `;
      return;
    }

    // 有課程就垂直排列
    let html = `<div class="time-row">`;
    html += `<div class="time-label">${time}</div>`;
    html += `<div class="time-slots">`;
    courses.forEach(c=>{
      const stu = studentList.find(s=>s.id===c.studentId);
      const name = stu?.name || '未知名';
      const no = stu?.studentNo || '';
      const timeRange = formatTime(c.time);
      const [h, m] = c.time.split(':');
      const minute = parseInt(h)*60 + parseInt(m);
      const baseMinute = parseInt(time.split(':')[0])*60;
      const offset = minute - baseMinute;
      const marginTop = (offset / 60) * 30 + 'px';
      const duration = 75;
      const width = Math.min(100, (duration / 60) * 100) + '%';
      const height = (duration / 60) * 30 + 'px';
      
      const statusMap = {
        pending: '#ffc107',
        completed: '#28a745',
        leave: '#dc3545',
        absent: '#333',
        holiday: '#17a2b8'
      };
      const color = statusMap[c.status] || '#879acb';
      html += `
      <div class="course-block" onclick="openQuickEdit('${c.id}','${name}')" style="border-left-color:${color};margin-top:${marginTop};width:${width};height:${height};">
        <div>${name} ${no}</div>
        <div style="font-size:10px;margin-top:2px;">${timeRange}</div>
      </div>`;
    });
    html += `</div></div>`;
    container.innerHTML += html;
  });
}

async function loadArtList(){
  if(!currentStudentId){
    document.getElementById('artStudentHeader').style.display='none';
    document.getElementById('artGrid').innerHTML='';
    document.getElementById('artPagination').innerHTML='';
    return;
  }
  const s=await db.collection('students').doc(currentStudentId).get();
  const stuData=s.data();
  document.getElementById('artStudentName').innerText=stuData.name;
  const avatarUrl=await getDirectImageUrl(stuData.avatar);
  document.getElementById('artAvatar').src=avatarUrl;
  document.getElementById('artAvatar').onerror=()=>document.getElementById('artAvatar').src='https://via.placeholder.com/100';
  document.getElementById('artStudentHeader').style.display='flex';

  const arts=await db.collection('artworks').where('studentId','==',currentStudentId).get();
  artList=[];arts.forEach(d=>artList.push({id:d.id,...d.data()}));
  
  artList.sort((a,b)=>new Date(b.createDate)-new Date(a.createDate));
  
  const totalPage = Math.ceil(artList.length / PER_PAGE);
  const start = (artPage-1)*PER_PAGE;
  const end = start + PER_PAGE;
  const show = artList.slice(start, end);

  const grid=document.getElementById('artGrid');
  grid.innerHTML='';

  for(let i=0;i<show.length;i++){
    const item=show[i];
    const img=await getDirectImageUrl(item.imageUrl);
    grid.innerHTML+=`
    <div class="art-card" onclick="showPreview(${i})">
      <img src="${img}" onerror="this.src='https://via.placeholder.com/160x180'">
    </div>`;
  }

  const p = document.getElementById('artPagination');
  p.innerHTML = `
    <button class="page-btn" onclick="changeArtPage(${artPage-1})" ${artPage<=1?'disabled':''}>上一頁</button>
    <span class="page-info">第 ${artPage} / ${totalPage} 頁</span>
    <button class="page-btn" onclick="changeArtPage(${artPage+1})" ${artPage>=totalPage?'disabled':''}>下一頁</button>
  `;
}

function changeArtPage(p){
  if(p<1) return;
  const total = Math.ceil(artList.length/PER_PAGE);
  if(p>total) return;
  artPage = p;
  loadArtList();
}

async function quickPackage(count){
  if(!isTeacher)return;
  const sid=currentStudentId;
  const startDate=document.getElementById('cday').value;
  const h=document.getElementById('chour').value.padStart(2,'0');
  const m=document.getElementById('cmin').value.padStart(2,'0');
  const startTime=`${h}:${m}`;
  const category=document.getElementById('courseCategory').value;
  if(!sid||!startDate||!h||!m)return;
  if(!confirm('產生'+count+'堂？'))return;
  const start=new Date(startDate);
  for(let i=0;i<count;i++){
    const dd=new Date(start);
    dd.setDate(start.getDate()+i*7);
    const date=dd.toISOString().split('T')[0];
    await db.collection('courses').add({studentId:sid,date,time:startTime,note:'課程',status:'pending',courseCategory:category});
  }
  alert('完成');
  closeAll();loadCourseList();await loadAllCoursesForCalendar();renderSmallCalendar();renderTimeTable();
}
