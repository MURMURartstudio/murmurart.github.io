<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MURMUR ART - 學員作品成長平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 老師 / 家長 切換 -->
<div class="role-selector">
    <button onclick="switchRole('teacher')">👩‍🏫 老師模式</button>
    <button onclick="switchRole('parent')">👨‍👩‍👧 家長模式</button>
</div>

<!-- 導航欄 -->
<div class="navbar">
    <div class="container nav-wrap">
        <div class="logo-container">
            <img src="https://p11-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/45afcf8642d843118169b9b9b9b7bddddc.png~tplv-a9rns2rl98-24:720:720.png" class="logo-img">
            <div class="logo-text">MURMUR ART</div>
        </div>
        <div class="nav-menu">
            <a href="#" class="active" onclick="showSection('gallery')">我的作品</a>
            <a href="#" onclick="showSection('course')">課程進度</a>
        </div>
    </div>
</div>

<!-- 作品 -->
<div class="container" id="gallerySection">
    <h2 class="gallery-title">🎨 作品專區</h2>
    <div id="artGallery" class="art-gallery"></div>
</div>

<!-- 課程 -->
<div class="container course-progress" id="courseSection">
    <h2 class="course-title">📋 課程進度</h2>

    <!-- 老師專用按鈕 (家長看不到) -->
    <div id="teacherControls" style="display:none; margin:20px 0;">
        <button class="add-btn" onclick="openAddCourseModal()">➕ 新增課程</button>
        <button class="add-btn" onclick="openAddStudentModal()">➕ 新增學生</button>
        <button class="clear-btn" onclick="clearAllCourses()">🗑️ 清空課程</button>
    </div>

    <table class="course-table">
        <thead>
            <tr>
                <th>日期</th>
                <th>時間</th>
                <th>主題</th>
                <th>狀態</th>
                <th id="actionHeader">操作（老師專用）</th>
            </tr>
        </thead>
        <tbody id="courseTableBody"></tbody>
    </table>
</div>

<!-- 彈窗 -->
<div id="modalOverlay" class="modal-overlay"></div>
<div id="editModal" class="modal"></div>

<script src="script.js"></script>
</body>
</html>
