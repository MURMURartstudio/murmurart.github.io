<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MURMUR ART - 家長專區</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微軟正黑體", sans-serif;
        }
        body {
            background: #f5f7fb;
            padding: 20px;
        }
        .login-panel {
            max-width: 450px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(135,154,203,0.15);
            text-align: center;
        }
        .login-title {
            color: #879acb;
            margin-bottom: 20px;
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e8edff;
            border-radius: 10px;
            outline: none;
        }
        .login-input:focus {
            border-color: #879acb;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #879acb;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
        }
        .success { background: #d4edda; color: #28a745; }
        .error { background: #f8d7da; color: #dc3545; }
        .course-section {
            max-width: 600px;
            margin: 30px auto;
            padding: 25px;
            background: white;
            border-radius: 15px;
            display: none;
        }
        .progress-card {
            padding: 15px;
            border-left: 4px solid #879acb;
            background: #f8f9ff;
            margin: 10px 0;
            border-radius: 8px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: #e8edff;
            border-radius: 5px;
            margin: 5px 0;
        }
        .progress-bar {
            height: 10px;
            background: #879acb;
            border-radius: 5px;
        }
        .art-section {
            max-width: 800px;
            margin: 30px auto;
            padding: 25px;
            background: white;
            border-radius: 15px;
            display: none;
        }
        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .art-card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .art-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .art-info {
            padding: 10px;
            font-size: 14px;
        }
        .teacher-comment {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #879acb;
        }
    </style>
</head>

<body>

<div class="login-panel">
    <h2 class="login-title">家長專區登入</h2>
    <input class="login-input" id="studentName" placeholder="學生姓名">
    <input class="login-input" id="studentPhone" placeholder="聯絡電話">
    <button class="login-btn" onclick="parentLogin()">登入查看孩子資料</button>
    <div id="loginStatus" class="status"></div>
</div>

<div class="course-section" id="courseSection">
    <h3 style="color:#879acb; margin-bottom:15px;">📚 課程進度</h3>
    <div id="courseList"></div>
</div>

<div class="art-section" id="artSection">
    <h3 style="color:#879acb; margin-bottom:15px;">🎨 孩子作品</h3>
    <div class="art-grid" id="artGrid"></div>
    <div class="teacher-comment" id="teacherComment"></div>
</div>

<!-- ====================== 唯一一段 Firebase 程式 ====================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqUEh-MjMZ5Gj2gaFJpKffrDmvP9l7Slo",
  authDomain: "murmurart-8f6cc.firebaseapp.com",
  projectId: "murmurart-8f6cc",
  storageBucket: "murmurart-8f6cc.firebasestorage.app",
  messagingSenderId: "205741159610",
  appId: "1:205741159610:web:624b7ca35c04e6e09a7e83",
  measurementId: "G-LRSB35J1KJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;
</script>

<script>
let currentStudent = null;

async function parentLogin() {
    const name = document.getElementById("studentName").value.trim();
    const phone = document.getElementById("studentPhone").value.trim();
    const status = document.getElementById("loginStatus");

    if (!name || !phone) {
        status.textContent = "請輸入完整資訊";
        status.className = "status error";
        return;
    }

    try {
        const studentRef = doc(db, "students", phone);
        const snap = await getDoc(studentRef);

        if (!snap.exists()) {
            status.textContent = "❌ 找不到學生資料，請聯繫老師";
            status.className = "status error";
            return;
        }

        currentStudent = snap.data();
        status.textContent = `✅ 登入成功！歡迎 ${currentStudent.name} 家長`;
        status.className = "status success";
        showAllData();

    } catch (e) {
        status.textContent = "❌ 登入失敗";
        status.className = "status error";
    }
}

function showAllData() {
    document.getElementById("courseSection").style.display = "block";
    document.getElementById("artSection").style.display = "block";

    document.getElementById("courseList").innerHTML = `
        <div class="progress-card">
            <div>兒童美術基礎班</div>
            <div class="progress-bar-bg"><div class="progress-bar" style="width:65%"></div></div>
            <div>進度：65%</div>
        </div>
    `;

    document.getElementById("artGrid").innerHTML = `
        <div class="art-card">
            <img class="art-img" src="https://picsum.photos/seed/${currentStudent.phone}/500/500">
            <div class="art-info">作品：快樂小畫家</div>
        </div>
    `;

    document.getElementById("teacherComment").innerHTML = `
        <strong>老師評語：</strong><br>
        ${currentStudent.comment || '表現優秀，繼續加油！'}
    `;
}
</script>

</body>
</html>
