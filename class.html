<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MURMUR ART ✨</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體;transition:all 0.25s ease}
    body{background:linear-gradient(120deg,#f5f7fb,#e8edff);color:#444}
    .navbar{background:white;padding:18px 0}
    .nav{display:flex;justify-content:space-between;align-items:center;width:90%;max-width:1200px;margin:0 auto}
    .logo{font-size:24px;color:#879acb}
    .menu a{margin-left:18px;color:#555;text-decoration:none;cursor:pointer}
    .menu a:hover{color:#879acb}
    .gallery{position:relative;width:100%;height:650px;display:flex;justify-content:center;align-items:center;margin:30px 0}
    .avatar{width:180px;height:180px;border-radius:50%;border:6px solid #879acb;position:absolute;z-index:10}
    .rotate{width:400px;height:400px;position:relative;animation:r 25s linear infinite}
    @keyframes r{100%{transform:rotate(360deg)}}
    .art{position:absolute;width:150px;height:150px;border-radius:14px;overflow:hidden;cursor:pointer}
    .art img{width:100%;height:100%;object-fit:cover}
    .container{width:90%;max-width:1200px;margin:0 auto}
    .info{background:white;padding:25px;border-radius:18px;margin-bottom:20px;display:flex;justify-content:space-between;text-align:center;box-shadow:0 5px 15px #00000010}
    .info-item{flex:1}
    .info-item h3{color:#879acb}
    table{width:100%;background:white;border-radius:16px;overflow:hidden;box-shadow:0 5px 15px #00000010}
    th{background:#879acb;color:white;padding:16px}
    td{padding:16px;border-bottom:1px solid #e8edff}
    .badge{padding:7px 13px;border-radius:20px;font-size:13px}
    .ok{background:#d4edda;color:#28a745}
    .wait{background:#fff3cd;color:#ffc107}
    .leave{background:#f8d7da;color:#dc3545}
    .absent{background:#e9ecef;color:#6c757d}
    .preview{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:700px;background:white;border-radius:20px;padding:25px;display:none;z-index:9999;box-shadow:0 20px 60px #00000040}
    .preview img{max-width:100%;max-height:400px;border-radius:12px}
    .prev,.next{position:absolute;top:50%;transform:translateY(-50%);font-size:22px;color:white;background:#879acb;padding:10px 16px;border-radius:10px;cursor:pointer}
    .prev{left:15px}
    .next{right:15px}
    .close{position:absolute;top:18px;right:18px;font-size:22px;cursor:pointer;color:#777}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="navbar">
  <div class="nav">
    <div class="logo">🎨 MURMUR ART - 學員專區</div>
    <div class="menu">
      <a onclick="sh(1)">🎨 作品</a>
      <a onclick="sh(2)">📋 課程</a>
      <a onclick="location.href='index.html'">返回</a>
    </div>
  </div>
</div>
<div class="container">
  <div id="p1">
    <h2 style="text-align:center;color:#879acb;margin:20px 0">🎨 學生作品</h2>
    <div class="gallery">
      <img class="avatar" id="avt" src="https://via.placeholder.com/200">
      <div class="rotate" id="r"></div>
    </div>
  </div>

  <div id="p2" style="display:none">
    <h2 style="text-align:center;color:#879acb;margin:20px 0">📋 課程進度</h2>
    <div class="info" id="info"></div>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>時間</th>
          <th>狀態</th>
          <th>備註</th>
        </tr>
      </thead>
      <tbody id="courseList"></tbody>
    </table>
  </div>
</div>

<div class="preview" id="preview">
  <span class="close" onclick="closePrev()">&times;</span>
  <div class="prev" onclick="prevImg()">&lt;</div>
  <img id="previewImg">
  <div class="next" onclick="nextImg()">&gt;</div>
</div>

<script>
const cfg = {apiKey:"AIzaSyBqUEh-MjMZ5Gj2gaFJpKffrDmvP9l7Slo",authDomain:"murmurart-8f6cc.firebaseapp.com",projectId:"murmurart-8f6cc",messagingSenderId:"205741159610",appId:"1:205741159610:web:624b7ca35c04e6e09a7e83"};
if(!firebase.apps.length)firebase.initializeApp(cfg);
const db=firebase.firestore();
const params=new URLSearchParams(location.search);
const uid=params.get('sid');
if(!uid)location.href='index.html';

let artList=[];
let currentImg=0;

window.onload=()=>{loadArt();loadCourse();sh(1)}
function sh(x){document.getElementById('p1').style.display=x==1?'block':'none';document.getElementById('p2').style.display=x==2?'block':'none'}
function closePrev(){document.getElementById('preview').style.display='none'}
function prevImg(){event.stopPropagation();currentImg=(currentImg-1+artList.length)%artList.length;showArt(currentImg)}
function nextImg(){event.stopPropagation();currentImg=(currentImg+1)%artList.length;showArt(currentImg)}

function getWeek(d){const w=['日','一','二','三','四','五','六'];return w[new Date(d).getDay()]}
function fmtTime(t){const [h,m]=t.split(':');const min=h*60+parseInt(m)+75;const eh=Math.floor(min/60),em=min%60;return `${t} - ${String(eh).padStart(2,0)}:${String(em).padStart(2,0)}`}

async function loadArt(){
  const wrap=document.getElementById('r');wrap.innerHTML='';
  const s=await db.collection('students').doc(uid).get();
  document.getElementById('avt').src=s.data().avatar||'https://via.placeholder.com/200';
  const res=await db.collection('artworks').where('studentId','==',uid).get();
  artList=[];res.forEach(d=>artList.push({...d.data()}));
  let a=0;const step=360/artList.length;
  artList.forEach((d,i)=>{
    wrap.innerHTML+=`<div class="art" style="transform:rotate(${a}deg) translate(200px) rotate(${-a}deg)" onclick="showArt(${i})"><img src="${d.imageUrl}"></div>`;
    a+=step;
  })
}
function showArt(i){currentImg=i;document.getElementById('previewImg').src=artList[i].imageUrl;document.getElementById('preview').style.display='block'}

async function loadCourse(){
  const list=document.getElementById('courseList');list.innerHTML='';
  const res=await db.collection('courses').where('studentId','==',uid).get();
  const map={pending:"wait",completed:"ok",leave:"leave",absent:"absent"};
  const name={pending:"⏳ 未完成",completed:"✔️ 已完成",leave:"🏖️ 請假",absent:"🚫 缺席"};
  let arr=[];res.forEach(d=>arr.push({id:d.id,...d.data()}));
  
  const total=arr.length;
  const completed=arr.filter(x=>x.status==='completed'||x.status==='leave').length;
  const left=total-completed;
  const rate=total>0?Math.round(completed/total*100):0;
  
  document.getElementById('info').innerHTML=`
  <div class="info-item"><h3>📊 總課程</h3><h2>${total}</h2></div>
  <div class="info-item"><h3>✅ 已完成</h3><h2>${completed}</h2></div>
  <div class="info-item"><h3>⏳ 剩餘</h3><h2>${left}</h2></div>
  <div class="info-item"><h3>🎯 完成率</h3><h2>${rate}%</h2></div>
  `;

  arr.sort((a,b)=>new Date(a.date)-new Date(b.date));
  arr.forEach(c=>{
    list.innerHTML+=`<tr>
      <td>${c.date}（${getWeek(c.date)}）</td>
      <td>${fmtTime(c.time)}</td>
      <td><span class="badge ${map[c.status]}">${name[c.status]}</span></td>
      <td>${c.note||'無'}</td>
    </tr>`;
  })
}
</script>
</body>
</html>
