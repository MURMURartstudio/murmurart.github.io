<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MURMUR ART 學生專區</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微软正黑体, "Noto Sans TC"}
    body{background:linear-gradient(120deg,#fdfbf7,#f0e9ff);color:#444;padding-bottom:100px}
    .container{width:90%;max-width:700px;margin:0 auto}
    .header{text-align:center;padding:30px 0}
    .logo{font-size:30px;color:#879acb;font-weight:bold}
    .card{background:white;border-radius:20px;padding:25px;text-align:center;margin:20px 0;box-shadow:0 8px 20px #879acb20}
    .card img{width:100px;height:100px;border-radius:50%;border:5px solid #879acb}
    .name{font-size:24px;color:#879acb;margin:10px 0}
    .info{color:#666;margin:5px 0}
    .section{margin:30px 0}
    .title{font-size:20px;color:#879acb;margin-bottom:15px}
    .course-list{background:white;border-radius:16px;overflow:hidden}
    .course-item{padding:15px;border-bottom:1px solid #eee}
    .date{color:#879acb;font-weight:bold}
    .badge{display:inline-block;padding:5px 10px;border-radius:10px;font-size:12px;color:white;margin-top:5px}
    .ok{background:#d4edda;color:#28a745}
    .wait{background:#fff3cd;color:#ffc107}
    .leave{background:#f8d7da;color:#dc3545}
    .absent{background:#333;color:white}
    .holiday{background:#d1ecf1;color:#17a2b8}
    .art-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:20px}
    .art-item{background:white;border-radius:14px;overflow:hidden}
    .art-item img{width:100%;height:160px;object-fit:cover}
    .pager{display:flex;justify-content:center;gap:10px;margin:20px 0}
    .pager button{padding:8px 12px;border:1px solid #879acb;background:white;color:#879acb;border-radius:8px}
    .pager button.active{background:#879acb;color:white}
    .sort{text-align:right;margin-bottom:10px}
    .sort button{padding:6px 10px;border:none;background:#879acb;color:white;border-radius:8px}
    .preview{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000dd;display:none;justify-content:center;align-items:center}
    .preview img{max-width:90%;max-height:80vh;border-radius:12px}
    .prev,.next{position:absolute;top:50%;transform:translateY(-50%);background:#879acb;color:white;padding:15px 20px;border:none;border-radius:10px;font-size:20px}
    .prev{left:20px}
    .next{right:20px}
    .footer{background:white;border-radius:16px;padding:25px;text-align:center;margin-top:40px}
    .social{display:flex;justify-content:center;gap:15px;margin-bottom:15px}
    .circle{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;text-decoration:none;font-weight:bold}
    .ig{background:#E4405F}
    .fb{background:#1877F2}
    .wa{background:#25D366}
    .reminder{background:#fff3cd;color:#ff9800;padding:10px 15px;border-radius:12px;text-align:center;margin:15px 0}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="container">
  <div class="header"><div class="logo">🎨 MURMUR ART</div></div>
  <div id="reminder" class="reminder" style="display:none">課程即將用罄，記得續課哦！</div>
  <div class="card">
    <img id="avatar">
    <div class="name" id="name"></div>
    <div class="info" id="no"></div>
    <div class="info" id="type"></div>
    <div class="info" id="left"></div>
    <div class="info" id="last" style="margin-top:10px;color:#879acb"></div>
  </div>

  <div class="section">
    <div class="title">🖼️ 學生作品</div>
    <div class="art-grid" id="artGrid"></div>
    <div class="pager" id="artPager"></div>
  </div>

  <div class="section">
    <div class="title">📅 課程記錄</div>
    <div class="sort"><button onclick="toggleSort()">切換正序/倒序</button></div>
    <div class="course-list" id="courseList"></div>
    <div class="pager" id="coursePager"></div>
  </div>

  <div class="footer">
    <h3 style="color:#879acb;margin-bottom:15px">🎨 歡迎追蹤我們</h3>
    <div class="social">
      <a href="https://www.instagram.com/murmur_artstudio/" target="_blank" class="circle ig">IG</a>
      <a href="https://www.facebook.com/share/1DMkDrhF65" target="_blank" class="circle fb">FB</a>
      <a href="https://wa.me/67480066" target="_blank" class="circle wa">WA</a>
    </div>
    <div style="font-size:13px;color:#666;margin-top:10px">
      請假請提前一天聯絡老師，缺席將不予補課<br>謝謝配合 😊
    </div>
  </div>
</div>

<div class="preview" id="preview">
  <img id="previewImg">
  <button class="prev" onclick="prevArt()">&lt;</button>
  <button class="next" onclick="nextArt()">&gt;</button>
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyBqUEh-MjMZ5Gj2gaFJpKffrDmvP9l7Slo",
  authDomain:"murmurart-8f6cc.firebaseapp.com",
  projectId:"murmurart-8f6cc",
  messagingSenderId:"205741159610",
  appId:"1:205741159610:web:624b7ca35c04e6e09a7e83"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const sid = new URLSearchParams(location.search).get('sid');
const PER_PAGE = 20;
let coursePage = 1, artPage = 1;
let courseAsc = false;
let courses = [], arts = [], currentArt = 0;

async function load(){
  const stu = await db.collection('students').doc(sid).get();
  const s = stu.data();
  document.getElementById('name').innerText = s.name;
  document.getElementById('no').innerText = '學生編號：'+(s.studentNo||'-');
  document.getElementById('type').innerText = '課程方案：'+(s.courseType||'-');
  document.getElementById('avatar').src = s.avatar||'https://via.placeholder.com/100';

  const cSnap = await db.collection('courses').where('studentId','==',sid).get();
  courses = []; cSnap.forEach(d=>courses.push({id:d.id,...d.data()}));
  const valid = courses.filter(x=>!['leave','holiday'].includes(x.status));
  const left = valid.length - valid.filter(x=>x.status==='completed'||x.status==='absent').length;
  document.getElementById('left').innerText = '剩餘堂數：'+left;
  if(left<3) document.getElementById('reminder').style.display='block';

  const last = courses.filter(x=>x.status==='completed').sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  if(last) document.getElementById('last').innerText = '🗓️ 上次上課：'+last.date;

  const aSnap = await db.collection('artworks').where('studentId','==',sid).get();
  arts = []; aSnap.forEach(d=>arts.push({id:d.id,...d.data()}));
  arts.sort((a,b)=>new Date(b.createDate)-new Date(a.createDate));

  renderCourses();
  renderArts();
}

function renderCourses(){
  const list = [...courses];
  if(!courseAsc) list.sort((a,b)=>new Date(a.date)-new Date(b.date));
  else list.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const start = (coursePage-1)*PER_PAGE;
  const pageList = list.slice(start, start+PER_PAGE);
  const box = document.getElementById('courseList');
  box.innerHTML = '';
  const map = {pending:'wait',completed:'ok',leave:'leave',absent:'absent',holiday:'holiday'};
  const txt = {pending:'未完成',completed:'已完成',leave:'請假',absent:'缺席',holiday:'假期'};
  pageList.forEach(c=>{
    box.innerHTML+=`
    <div class="course-item">
      <div class="date">${c.date} ${c.time}</div>
      <span class="badge ${map[c.status]}">${txt[c.status]}</span>
    </div>`;
  });
  makePager('coursePager',courses.length,coursePage,p=>{coursePage=p;renderCourses();});
}

function renderArts(){
  const start=(artPage-1)*PER_PAGE;
  const list=arts.slice(start,start+PER_PAGE);
  const box=document.getElementById('artGrid');
  box.innerHTML='';
  list.forEach((a,i)=>{
    box.innerHTML+=`
    <div class="art-item" onclick="openArt(${start+i})">
      <img src="${a.imageUrl}">
    </div>`;
  });
  makePager('artPager',arts.length,artPage,p=>{artPage=p;renderArts();});
}

function makePager(id,total,page,cb){
  const p=document.getElementById(id);
  p.innerHTML='';
  const max=Math.ceil(total/PER_PAGE);
  for(let i=1;i<=max;i++){
    const b=document.createElement('button');
    b.innerText=i;
    if(i===page) b.classList.add('active');
    b.onclick=()=>cb(i);
    p.appendChild(b);
  }
}

function toggleSort(){courseAsc=!courseAsc;renderCourses();}
function openArt(i){currentArt=i;document.getElementById('previewImg').src=arts[i].imageUrl;document.getElementById('preview').style.display='flex';}
function prevArt(){currentArt=(currentArt-1+arts.length)%arts.length;document.getElementById('previewImg').src=arts[currentArt].imageUrl;}
function nextArt(){currentArt=(currentArt+1)%arts.length;document.getElementById('previewImg').src=arts[currentArt].imageUrl;}

load();
</script>
</body>
</html>
