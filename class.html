<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MURMUR ART 學生專區</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體,"Noto Sans TC"}
  body{background:linear-gradient(120deg,#fdfbf7,#f0e9ff);color:#444;padding-bottom:60px}
  .container{width:90%;max-width:800px;margin:0 auto}
  header{background:white;box-shadow:0 2px 10px #00000010;padding:16px 0;margin-bottom:20px;position:sticky;top:0;z-index:10}
  .header-inner{display:flex;justify-content:space-between;align-items:center}
  .logo{font-size:24px;color:#879acb;font-weight:bold}
  .back{color:#879acb;text-decoration:none}
  .student-card{background:white;border-radius:18px;padding:20px;display:flex;align-items:center;gap:16px;margin-bottom:20px;box-shadow:0 4px 12px #0000000a}
  .student-card img{width:70px;height:70px;border-radius:50%;border:4px solid #879acb}
  .student-info h2{color:#879acb;margin-bottom:4px}
  .student-info p{color:#666;font-size:14px;margin:2px 0}
  .stats{background:white;padding:16px 20px;border-radius:16px;display:flex;gap:10px;text-align:center;margin-bottom:20px}
  .stat{flex:1}
  .stat h3{font-size:14px;color:#888}
  .stat .num{font-size:22px;font-weight:bold;color:#879acb;margin-top:4px}
  .tabs{display:flex;background:white;border-radius:16px;overflow:hidden;margin-bottom:20px}
  .tab{flex:1;padding:12px;text-align:center;cursor:pointer}
  .tab.active{background:#879acb;color:white}
  .page{display:none}
  .page.active{display:block}
  .art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .art-item{background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 10px #0000000a}
  .art-item img{width:100%;height:160px;object-fit:cover}
  .art-info{padding:8px;font-size:12px;color:#666}
  .schedule-list{background:white;border-radius:16px;overflow:hidden}
  .schedule-item{padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
  .schedule-left{display:flex;align-items:center;gap:10px}
  .schedule-date{font-weight:bold;color:#879acb;min-width:70px}
  .schedule-time{color:#555}
  .badge{padding:4px 8px;border-radius:8px;font-size:12px;color:white}
  .ok{background:#28a745}
  .wait{background:#ffc107}
  .leave{background:#dc3545}
  .absent{background:#333}
  .holiday{background:#17a2b8}
  .preview{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000dd;display:none;justify-content:center;align-items:center;padding:20px;z-index:999}
  .preview-box{background:white;border-radius:20px;padding:20px;max-width:500px;width:100%}
  .preview-box img{max-width:100%;border-radius:12px;margin-bottom:10px}
  .close{text-align:right;font-size:20px;cursor:pointer;margin-bottom:8px}
  .footer{text-align:center;margin-top:40px;padding:20px 0;color:#666;font-size:14px}
  .social{display:flex;justify-content:center;gap:16px;margin-top:10px}
  .social a{color:#879acb;text-decoration:none}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
  <div class="container header-inner">
    <div class="logo">🎨 MURMUR ART</div>
    <a href="index.html" class="back">返回登入</a>
  </div>
</header>

<div class="container">
  <div class="student-card" id="studentCard">
    <img id="avatar">
    <div class="student-info">
      <h2 id="name"></h2>
      <p id="phone"></p>
      <p id="courseType"></p>
    </div>
  </div>

  <div class="stats" id="stats" style="display:none;">
    <div class="stat">
      <h3>總課程</h3>
      <div class="num" id="total"></div>
    </div>
    <div class="stat">
      <h3>已完成</h3>
      <div class="num" id="done"></div>
    </div>
    <div class="stat">
      <h3>剩餘</h3>
      <div class="num" id="left"></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('art')">作品</div>
    <div class="tab" onclick="switchTab('schedule')">課表</div>
  </div>

  <div id="art" class="page active">
    <div class="art-grid" id="artGrid"></div>
  </div>

  <div id="schedule" class="page">
    <div class="schedule-list" id="scheduleList"></div>
  </div>
</div>

<div class="preview" id="preview">
  <div class="preview-box">
    <div class="close" onclick="closePreview()">&times;</div>
    <img id="previewImg">
    <div class="art-info">
      <p><strong>日期：</strong><span id="pDate"></span></p>
      <p><strong>備註：</strong><span id="pNote"></span></p>
    </div>
  </div>
</div>

<div class="footer">
  <p>© 2025 MURMUR ART. All rights reserved.</p>
  <div class="social">
    <a href="https://www.instagram.com/murmur_art/" target="_blank">Instagram</a>
    <a href="https://www.facebook.com/murmurart" target="_blank">Facebook</a>
    <a href="https://wa.me/85212345678" target="_blank">WhatsApp</a>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyBqUEh-MjMZ5Gj2gaFJpKffrDmvP9l7Slo",
  authDomain:"murmurart-8f6cc.firebaseapp.com",
  projectId:"murmurart-8f6cc",
  messagingSenderId:"205741159610",
  appId:"1:205741159610:web:624b7ca35c04e6e09a7e83"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const sid = params.get('sid');
let artList = [];
let courseList = [];

if (!sid) location.href = 'index.html';

async function getDirectImageUrl(url) {
  if (!url) return "https://via.placeholder.com/300";
  let imgbbMatch = url.match(/ibb\.co\/([a-zA-Z0-9]+)/);
  if (imgbbMatch) return `https://i.ibb.co/${imgbbMatch[1]}/image.jpg`;
  if (url.includes("i.ibb.co")) return url;
  let driveMatch = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if (driveMatch) return "https://drive.google.com/thumbnail?id="+driveMatch[1]+"&sz=w1000";
  return url;
}

async function loadStudent() {
  const doc = await db.collection('students').doc(sid).get();
  if (!doc.exists) location.href = 'index.html';
  const data = doc.data();
  document.getElementById('name').innerText = data.name || '';
  document.getElementById('phone').innerText = '家長電話：' + (data.parentPhone || '');
  document.getElementById('courseType').innerText = '課程方案：' + (data.courseType || '');
  const avatar = await getDirectImageUrl(data.avatar);
  document.getElementById('avatar').src = avatar;
  document.getElementById('avatar').onerror = e => e.target.src = "https://via.placeholder.com/70";
}

async function loadArt() {
  const snap = await db.collection('artworks').where('studentId', '==', sid).get();
  artList = [];
  snap.forEach(d => artList.push({ id: d.id, ...d.data() }));
  artList.sort((a, b) => new Date(b.createDate) - new Date(a.createDate));
  const grid = document.getElementById('artGrid');
  grid.innerHTML = '';
  for (let item of artList) {
    const img = await getDirectImageUrl(item.imageUrl);
    grid.innerHTML += `
    <div class="art-item" onclick="showPreview('${img}','${item.createDate}','${item.note||''}')">
      <img src="${img}" onerror="this.src='https://via.placeholder.com/150x160'">
      <div class="art-info">${item.createDate}</div>
    </div>`;
  }
}

async function loadSchedule() {
  const snap = await db.collection('courses').where('studentId', '==', sid).get();
  courseList = [];
  snap.forEach(d => courseList.push({ id: d.id, ...d.data() }));
  courseList.sort((a, b) => new Date(a.date) - new Date(b.date));
  const list = document.getElementById('scheduleList');
  list.innerHTML = '';
  const map = {
    pending: 'wait',
    completed: 'ok',
    leave: 'leave',
    absent: 'absent',
    holiday: 'holiday'
  };
  const txt = {
    pending: '未完成',
    completed: '已完成',
    leave: '請假',
    absent: '缺席',
    holiday: '假期'
  };
  for (let c of courseList) {
    list.innerHTML += `
    <div class="schedule-item">
      <div class="schedule-left">
        <div class="schedule-date">${c.date}</div>
        <div class="schedule-time">${c.time}</div>
      </div>
      <span class="badge ${map[c.status]}">${txt[c.status]}</span>
    </div>`;
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

function showPreview(img, date, note) {
  document.getElementById('previewImg').src = img;
  document.getElementById('pDate').innerText = date;
  document.getElementById('pNote').innerText = note || '無';
  document.getElementById('preview').style.display = 'flex';
}

function closePreview() {
  document.getElementById('preview').style.display = 'none';
}

loadStudent();
loadArt();
loadSchedule();
</script>
</body>
</html>
