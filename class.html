function getWeek(d){
  const w=['日','一','二','三','四','五','六'];
  return w[new Date(d).getDay()];
}

async function loadStudent(){
  const doc = await db.collection('students').doc(sid).get();
  if(!doc.exists) return;
  const data = doc.data();
  document.getElementById('studentName').innerText = data.name;
  document.getElementById('name').innerText = data.name;
  document.getElementById('studentNo').innerText = '學生編號：'+(data.studentNo||'-');
  document.getElementById('courseType').innerText = '課程方案：'+(data.courseType||'-');
  
  const avatar = await getDirectImageUrl(data.avatar);
  document.getElementById('avatarImg').src = avatar;
  document.getElementById('avatarImg').onerror = e=>e.target.src="https://via.placeholder.com/100";
  document.getElementById('studentHead').style.display = "flex";
  document.getElementById('avatar').src = avatar;
  document.getElementById('avatar').onerror = e=>e.target.src="https://via.placeholder.com/100";
}

async function loadArt(){
  const snap = await db.collection('artworks').where('studentId','==',sid).get();
  artList = [];
  snap.forEach(d=>artList.push({id:d.id,...d.data()}));
  const grid = document.getElementById('artGrid');
  grid.innerHTML = '';
  for(let item of artList){
    const img = await getDirectImageUrl(item.imageUrl);
    grid.innerHTML += `
    <div class="art-card" onclick="openPrev('${img}')">
      <img src="${img}" onerror="this.src='https://via.placeholder.com/160x180'">
      <div class="art-info">${item.createDate || ''}</div>
    </div>`;
  }
}

async function loadCourses(){
  const snap = await db.collection('courses').where('studentId','==',sid).get();
  courseList = [];
  snap.forEach(d=>courseList.push({id:d.id,...d.data()}));
  const valid = courseList.filter(c=>!['leave','holiday'].includes(c.status));
  const arr = [];
  snap.forEach(d=>arr.push({id:d.id,...d.data()}));
  
  const valid = arr.filter(x=>!['leave','holiday'].includes(x.status));
  const total = valid.length;
  const done = valid.filter(c=>c.status==='completed'||c.status==='absent').length;
  const done = valid.filter(x=>x.status==='completed'||x.status==='absent').length;
  const left = total - done;
  document.getElementById('stats').innerHTML = `
  <div class="stat"><h3>總堂數</h3><h2>${total}</h2></div>
  <div class="stat"><h3>已完成</h3><h2>${done}</h2></div>
  <div class="stat"><h3>剩餘</h3><h2>${left}</h2></div>`;
  
  document.getElementById('left').innerText = '剩餘堂數：'+left;

  // 上次上課日期
  const last = arr.filter(x=>x.status==='completed').sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  if(last){
    document.getElementById('lastClass').style.display='block';
    document.getElementById('lastClass').innerText=`🗓️ 上次上課：${last.date}（${getWeek(last.date)}）`;
  }

  // 續費提醒
  if(left < 3){
    document.getElementById('reminderBox').style.display = 'block';
  }

  const tbody = document.getElementById('courseList');
  tbody.innerHTML = '';
  const list = document.getElementById('courseList');
  list.innerHTML = '';
  const map = {pending:'wait',completed:'ok',leave:'leave',absent:'absent',holiday:'holiday'};
  const txt = {pending:'未完成',completed:'已完成',leave:'請假',absent:'缺席',holiday:'假期'};
  for(let c of courseList){
    tbody.innerHTML += `
    <tr>
      <td>${c.date}</td>
      <td>${c.time}</td>
      <td><span class="badge ${map[c.status]}">${txt[c.status]}</span></td>
      <td>${c.note||'-'}</td>
    </tr>`;

  arr.sort((a,b)=>new Date(b.date)-new Date(a.date));

  for(let c of arr){
    list.innerHTML += `
    <div class="course-item">
      <div class="course-date">${c.date}（${getWeek(c.date)}）${c.time}</div>
      <span class="course-status ${map[c.status]}">${txt[c.status]}</span>
    </div>`;
  }
}

async function loadArt(){
  const snap = await db.collection('artworks').where('studentId','==',sid).get();
  const list = document.getElementById('artGrid');
  list.innerHTML = '';
  const arts = [];
  snap.forEach(d=>arts.push({id:d.id,...d.data()}));
  
  // 依照日期排序 最新在前
  arts.sort((a,b)=>new Date(b.createDate)-new Date(a.createDate));

  for(let i=0;i<arts.length;i++){
    const item = arts[i];
    const img = await getDirectImageUrl(item.imageUrl);
    list.innerHTML += `
    <div class="art-item" onclick="showPreview(${i})">
      <img src="${img}" onerror="this.src='https://via.placeholder.com/150x160'">
    </div>`;
  }
  window.arts = arts;
}

function openPrev(url){
  document.getElementById('prevImg').src = url;
  document.getElementById('preview').style.display = "block";
function showPreview(i){
  const item = window.arts[i];
  document.getElementById('previewImg').src = item.imageUrl;
  document.getElementById('previewDate').innerText = item.createDate;
  document.getElementById('preview').style.display = 'flex';
}
function closePrev(){
  document.getElementById('preview').style.display = "none";

function closePreview(){
  document.getElementById('preview').style.display = 'none';

function show(n){
  document.getElementById('page1').style.display = n===1 ? 'block' : 'none';
  document.getElementById('page2').style.display = n===2 ? 'block' : 'none';
async function init(){
