async function getDirectImageUrl(url) {
  if (!url) return "https://via.placeholder.com/300";
  let imgbbMatch = url.match(/ibb\.co\/([a-zA-Z0-9]+)/);
  if (imgbbMatch) return `https://i.ibb.co/${imgbbMatch[1]}/image.jpg`;
  if (url.includes("i.ibb.co") && (url.endsWith(".jpg")||url.endsWith(".png")||url.endsWith(".jpeg"))) return url;
  let driveMatch = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if (driveMatch) return "https://drive.google.com/thumbnail?id="+driveMatch[1]+"&sz=w1000";
  return "https://via.placeholder.com/300";
}

async function loadCourse(){

  const valid = courseList.filter(c=>!['leave','holiday'].includes(c.status));

  const done = valid.filter(c=>c.status==='completed'||c.status==='absent').length;
  const left = total - done;
  document.getElementById('stats').innerHTML = `
  <div class="stat"><h3>總堂數</h3><h2>${total}</h2></div>
  <div class="stat"><h3>已完成</h3><h2>${done}</h2></div>
  <div class="stat"><h3>剩餘</h3><h2>${left}</h2></div>`;

  const tbody = document.getElementById('courseList');
  tbody.innerHTML = '';
  const map = {pending:'wait',completed:'ok',leave:'leave',absent:'absent',holiday:'holiday'};
  const txt = {pending:'未完成',completed:'已完成',leave:'請假',absent:'缺席',holiday:'假期'};
  for(let c of courseList){
    tbody.innerHTML += `
    <tr>
      <td>${c.date}</td>

      <td><span class="badge ${map[c.status]}">${txt[c.status]}</span></td>
