<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生專區 - MURMUR ART</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體}
    body{background:linear-gradient(120deg,#fdfbf7,#f0e9ff);color:#444}
    .container{width:90%;max-width:1000px;margin:0 auto}
    .navbar{background:white;padding:16px 0;box-shadow:0 2px 10px #00000010}
    .nav{display:flex;justify-content:space-between;align-items:center}
    .logo{font-size:22px;color:#879acb}
    .menu a{margin-left:16px;color:#555;text-decoration:none;cursor:pointer}
    .student-head{display:flex;align-items:center;gap:16px;justify-content:center;margin:20px 0}
    .student-head img{width:100px;height:100px;border-radius:50%;border:4px solid #879acb}
    .student-head h2{font-size:24px;color:#879acb}
    .art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-top:20px}
    .art-card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 12px #00000010}
    .art-card img{width:100%;height:180px;object-fit:cover}
    .art-info{padding:10px;text-align:center;font-size:12px;color:#666}
    .stats{background:white;padding:20px;border-radius:16px;display:flex;gap:15px;text-align:center;margin:15px 0}
    .stat{flex:1}
    table{width:100%;background:white;border-radius:16px;overflow:hidden;margin-top:20px}
    th{background:#879acb;color:white;padding:14px}
    td{padding:14px;border-bottom:1px solid #e8edff}
    .badge{padding:6px 10px;border-radius:20px;font-size:12px}
    .ok{background:#d4edda;color:#28a745}
    .wait{background:#fff3cd;color:#ffc107}
    .leave{background:#f8d7da;color:#dc3545}
    .absent{background:#e9ecef;color:#6c757d}
    .holiday{background:#d1ecf1;color:#17a2b8}
    .preview{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:800px;background:white;border-radius:20px;padding:25px;display:none;z-index:999}
    .preview img{max-width:100%;max-height:70vh;border-radius:12px}
    .close{position:absolute;top:18px;right:18px;font-size:22px;cursor:pointer}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="navbar">
  <div class="container nav">
    <div class="logo">🎨 MURMUR ART</div>
    <div class="menu">
      <a onclick="show(1)">作品</a>
      <a onclick="show(2)">課程</a>
      <a onclick="location.href='index.html'">返回</a>
    </div>
  </div>
</div>

<div class="container">
  <div id="studentHead" class="student-head" style="display:none">
    <img id="avatarImg">
    <div>
      <h2 id="studentName"></h2>
    </div>
  </div>

  <div id="page1">
    <h2 style="text-align:center;color:#879acb;margin:10px 0">學生作品</h2>
    <div class="art-grid" id="artGrid"></div>
  </div>

  <div id="page2" style="display:none">
    <h2 style="text-align:center;color:#879acb;margin:10px 0">課程進度</h2>
    <div class="stats" id="stats"></div>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>時間</th>
          <th>狀態</th>
          <th>備註</th>
        </tr>
      </thead>
      <tbody id="courseList"></tbody>
    </table>
  </div>
</div>

<div class="preview" id="preview">
  <span class="close" onclick="closePrev()">&times;</span>
  <img id="prevImg">
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyBqUEh-MjMZ5Gj2gaFJpKffrDmvP9l7Slo",
  authDomain:"murmurart-8f6cc.firebaseapp.com",
  projectId:"murmurart-8f6cc",
  messagingSenderId:"205741159610",
  appId:"1:205741159610:web:624b7ca35c04e6e09a7e83"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const sid = params.get('sid');
let artList = [];
let courseList = [];

async function getDirectImageUrl(url) {
  if (!url) return "https://via.placeholder.com/300";
  let imgbbMatch = url.match(/ibb\.co\/([a-zA-Z0-9]+)/);
  if (imgbbMatch) return `https://i.ibb.co/${imgbbMatch[1]}/image.jpg`;
  if (url.includes("i.ibb.co") && (url.endsWith(".jpg")||url.endsWith(".png")||url.endsWith(".jpeg"))) return url;
  let driveMatch = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if (driveMatch) return "https://drive.google.com/thumbnail?id="+driveMatch[1]+"&sz=w1000";
  return "https://via.placeholder.com/300";
}

async function loadStudent(){
  const doc = await db.collection('students').doc(sid).get();
  if(!doc.exists) return;
  const data = doc.data();
  document.getElementById('studentName').innerText = data.name;
  const avatar = await getDirectImageUrl(data.avatar);
  document.getElementById('avatarImg').src = avatar;
  document.getElementById('avatarImg').onerror = e=>e.target.src="https://via.placeholder.com/100";
  document.getElementById('studentHead').style.display = "flex";
}

async function loadArt(){
  const snap = await db.collection('artworks').where('studentId','==',sid).get();
  artList = [];
  snap.forEach(d=>artList.push({id:d.id,...d.data()}));
  const grid = document.getElementById('artGrid');
  grid.innerHTML = '';
  for(let item of artList){
    const img = await getDirectImageUrl(item.imageUrl);
    grid.innerHTML += `
    <div class="art-card" onclick="openPrev('${img}')">
      <img src="${img}" onerror="this.src='https://via.placeholder.com/160x180'">
      <div class="art-info">${item.createDate || ''}</div>
    </div>`;
  }
}

async function loadCourse(){
  const snap = await db.collection('courses').where('studentId','==',sid).get();
  courseList = [];
  snap.forEach(d=>courseList.push({id:d.id,...d.data()}));
  const valid = courseList.filter(c=>!['leave','holiday'].includes(c.status));
  const total = valid.length;
  const done = valid.filter(c=>c.status==='completed'||c.status==='absent').length;
  const left = total - done;
  document.getElementById('stats').innerHTML = `
  <div class="stat"><h3>總堂數</h3><h2>${total}</h2></div>
  <div class="stat"><h3>已完成</h3><h2>${done}</h2></div>
  <div class="stat"><h3>剩餘</h3><h2>${left}</h2></div>`;

  const tbody = document.getElementById('courseList');
  tbody.innerHTML = '';
  const map = {pending:'wait',completed:'ok',leave:'leave',absent:'absent',holiday:'holiday'};
  const txt = {pending:'未完成',completed:'已完成',leave:'請假',absent:'缺席',holiday:'假期'};
  for(let c of courseList){
    tbody.innerHTML += `
    <tr>
      <td>${c.date}</td>
      <td>${c.time}</td>
      <td><span class="badge ${map[c.status]}">${txt[c.status]}</span></td>
      <td>${c.note||'-'}</td>
    </tr>`;
  }
}

function openPrev(url){
  document.getElementById('prevImg').src = url;
  document.getElementById('preview').style.display = "block";
}
function closePrev(){
  document.getElementById('preview').style.display = "none";
}

function show(n){
  document.getElementById('page1').style.display = n===1 ? 'block' : 'none';
  document.getElementById('page2').style.display = n===2 ? 'block' : 'none';
}

loadStudent();
loadArt();
loadCourse();
</script>
</body>
</html>
